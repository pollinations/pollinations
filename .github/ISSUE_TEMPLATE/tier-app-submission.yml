name: SubmitApp
description: Get your app featured on pollinations.ai
title: "[App Submission]"
labels: ["TIER-APP"]
body:
  - type: markdown
    attributes:
      value: |
        # Submit Your App to pollinations.ai
        
        > Thanks for submitting your app! Fill out the form below and we'll review it for the [Official Showcase](https://pollinations.ai/apps).
        ---
        ## Requirements
        - Have an account at [enter.pollinations.ai](https://enter.pollinations.ai) (sign up with GitHub)
        - Your app must use the pollinations.ai API

        ## Credit pollinations.ai *(optional but appreciated)*
        - Link to [pollinations.ai](https://pollinations.ai) in your frontend/README
        - Official logos: [`pollinations.ai Logo White`](https://raw.githubusercontent.com/pollinations/pollinations/main/assets/logo.svg) / [`pollinations.ai Logo Text White`](https://raw.githubusercontent.com/pollinations/pollinations/main/assets/logo-text.svg)
        - Official Badge: [`Built With pollinations.ai`](https://img.shields.io/badge/Built%20with-Pollinations-8a2be2?style=for-the-badge&logo=data:image/png;base64,&logoColor=white&labelColor=6a0dad)
        ---
        **Your GitHub username will be credited as the `App Author`. Make sure it's the same account that you have used to sign up at [enter.pollinations.ai](https://enter.pollinations.ai).**

  - type: input
    id: app-name
    attributes:
      label: App Name
      description: What is the name of your app?
      placeholder: "e.g., AI Art Gallery"
    validations:
      required: true

  - type: textarea
    id: app-description
    attributes:
      label: App Description
      description: Please provide a brief description of your app and how it uses pollinations.ai
      placeholder: "Describe what your app does and how it integrates with pollinations.ai..."
    validations:
      required: true

  - type: input
    id: app-url
    attributes:
      label: App URL
      description: Link to your app (if public)
      placeholder: "https://example.com"
    validations:
      required: true

  - type: input
    id: github-repo
    attributes:
      label: GitHub Open Source Repository URL
      description: Provide a link to your app's GitHub repository (if available)
      placeholder: "https://github.com/your-repo"

  - type: input
    id: discord-contact
    attributes:
      label: Discord Username
      description: Your Discord username so we can reach you (optional)
      placeholder: "e.g., username or username#1234"
      
  - type: input
    id: app-language
    attributes:
      label: App Language
      description: If your app is NOT in English, specify the language code (e.g., zh-CN, es, pt-BR, ja)
      placeholder: "e.g., zh-CN for Chinese, es for Spanish, ja for Japanese"

  - type: input
    id: other-contact
    attributes:
      label: Email / Other Contact
      description: Any other way to reach you (Email, Twitter/X, Instagram, website, etc.)
      placeholder: "e.g., https://twitter.com/yourhandle"
    validations:
      required: true
