name: Tier Question
description: Questions about your pollen tier or grants
title: "Tier: "
labels: ["TIER", ".QUESTION"]
body:
  - type: dropdown
    id: current_tier
    attributes:
      label: Current Tier
      description: What does your dashboard show?
      options:
        - Account under review
        - Weekly pollen (1.5/week)
        - Seed (3 pollen/day)
        - Flower (10 pollen/day)
        - Nectar (20 pollen/day)
        - Router (500 pollen/day)
        - Not sure

  - type: textarea
    id: description
    attributes:
      label: .QUESTION
      placeholder: "e.g., Why is my account under review? How do I unlock Seed tier?"
    validations:
      required: true
