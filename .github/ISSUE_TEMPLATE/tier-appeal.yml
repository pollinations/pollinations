name: Tier Question
description: Questions about your tier
title: "Tier:"
labels: ["TIER", ".QUESTION"]
body:
  - type: dropdown
    id: current_tier
    attributes:
      label: Current Tier
      description: What does your dashboard show?
      options:
        - Account under review
        - Spore (0.01 pollen/hour)
        - Seed (0.15 pollen/hour)
        - Flower (0.4 pollen/hour)
        - Nectar (0.8 pollen/hour)

  - type: textarea
    id: description
    attributes:
      label: Question
      placeholder: "e.g., Why is my account under review? How do I unlock Seed tier?"
    validations:
      required: true
