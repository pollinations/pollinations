name: Abuse Detection Cron

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  detect-and-block:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd enter.pollinations.ai && npm install

      - name: Create API token file
        run: echo "ENTER_API_TOKEN_REMOTE=${{ secrets.ENTER_API_TOKEN }}" > enter.pollinations.ai/.testingtokens

      - name: Run abuse detection and apply blocks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd enter.pollinations.ai && npx tsx scripts/detect-abuse.ts --last 24h --parallel 3 --auto-apply
