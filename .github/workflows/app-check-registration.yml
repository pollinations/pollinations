name: App Check Registration

on:
  issue_comment:
    types: [created]

concurrency:
  group: app-check-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  check-registration:
    # Only run on PRs (not issues) with TIER-APP-INCOMPLETE label AND comment is from PR author
    # NO PR MERGE = NO TIER CHANGE - this ensures we only upgrade after merge
    if: |
      github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'TIER-APP-INCOMPLETE') &&
      github.event.comment.user.login == github.event.issue.user.login
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Generate pollinations.ai Token
        id: pollinations-ai
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if PR is merged
        id: pr-status
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const merged = pr.merged === true;
            console.log(`PR #${prNumber} merged: ${merged}`);
            core.setOutput('merged', merged.toString());

      - name: Check if user is now registered
        id: check
        if: steps.pr-status.outputs.merged == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          GITHUB_USERNAME: ${{ github.event.issue.user.login }}
        run: |
          npm install -g wrangler
          npm install
          cd enter.pollinations.ai
          
          echo "Checking registration for $GITHUB_USERNAME..."
          
          if npx tsx src/tier-progression/shared/tier-update-user.ts check-user \
            --githubUsername "$GITHUB_USERNAME" \
            --env production 2>&1 | grep -q "EXISTS"; then
            echo "registered=true" >> $GITHUB_OUTPUT
            echo "✅ User $GITHUB_USERNAME is now registered"
          else
            echo "registered=false" >> $GITHUB_OUTPUT
            echo "❌ User $GITHUB_USERNAME is still not registered"
          fi

      - name: Post result and update labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const prMerged = '${{ steps.pr-status.outputs.merged }}' === 'true';
            const registered = '${{ steps.check.outputs.registered }}' === 'true';
            const prNumber = context.payload.issue.number;
            const username = context.payload.issue.user.login;

            // PR not merged yet - no action, user needs to wait for merge
            if (!prMerged) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `@${username}, thanks for registering! Once this PR is merged, you can claim the **Contribute a pull request** quest from your [enter.pollinations.ai](https://enter.pollinations.ai) dashboard. 🌸`
              });
              console.log(`PR #${prNumber} not merged yet`);
              return;
            }

            if (registered) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `### 🌸 You're registered!\n\n@${username}, your merged PR unlocks the **Contribute a pull request** quest — claim it from your [enter.pollinations.ai](https://enter.pollinations.ai) dashboard for 5 Quest Pollen.`
              });

              // Remove INCOMPLETE label and close the issue
              try {
                await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: 'TIER-APP-INCOMPLETE' });
              } catch (e) { /* label might not exist */ }

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                state: 'closed',
                state_reason: 'completed'
              });

              console.log(`✅ Confirmed registration for ${username}`);
            } else {
              // Still not registered - gentle reminder
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `@${username}, I checked but couldn't find your account yet.\n\nPlease make sure you:\n1. Sign up at [enter.pollinations.ai](https://enter.pollinations.ai) using **GitHub login**\n2. Reply here once you've completed registration\n\nWe'll check again! 🌸`
              });

              console.log(`User ${username} still not registered`);
            }
