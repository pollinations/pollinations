name: App Merge Celebration

on:
  pull_request_target:
    types: [closed]
    branches: [main]
    paths:
      - 'apps/APPS.md'

concurrency:
  group: app-merge-celebration-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # When a maintainer closes an app PR without merging, label the issue as rejected
  handle-rejection:
    if: |
      github.event.pull_request.merged == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Label issue as rejected
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(closePattern)];

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['TIER-APP-REJECTED']
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
                console.log(`Rejected and closed issue #${issueNumber}`);
              } catch (e) {
                console.log(`Could not update issue #${issueNumber}: ${e.message}`);
              }
            }

  celebrate-merge:
    # Run when an app submission PR is merged (branch: auto/app-{issue}-{slug})
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Generate pollinations.ai Token
        id: pollinations-ai
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Post celebration and close linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            const prBody = context.payload.pull_request.body || '';

            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const issueNumbers = [...prBody.matchAll(closePattern)].map(m => parseInt(m[1]));

            const questNote = 'Your merged PR unlocks the **Contribute a pull request** quest — claim it from your [enter.pollinations.ai](https://enter.pollinations.ai) dashboard for 5 Quest Pollen.';

            if (issueNumbers.length > 0) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumbers[0]
              });
              const submitter = issue.user.login;

              const prMessage = `## 🎉 App Added & Verified!\n\nThis PR added **@${submitter}**'s app to the [pollinations.ai showcase](https://pollinations.ai).\n\n${questNote}\n\nSee issue #${issueNumbers[0]} for full details.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: prMessage
              });

              for (const issueNumber of issueNumbers) {
                const issueMessage = `## 🎉 App Approved & Verified!\n\nYour app has been added to the [pollinations.ai showcase](https://pollinations.ai)!\n\n${questNote}\n\nThank you for contributing to pollinations.ai! 🌻`;
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: issueMessage
                  });

                  // Close the issue (Fixes #NNN in PR body also auto-closes, but be explicit)
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed'
                  });

                  console.log(`Posted celebration and closed issue #${issueNumber}`);
                } catch (e) {
                  console.log(`Could not update issue #${issueNumber}: ${e.message}`);
                }
              }
            } else {
              const prMessage = `## 🎉 Contribution Merged & Verified!\n\nThank you **@${prAuthor}** for your contribution to pollinations.ai!\n\n${questNote}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: prMessage
              });
              console.log(`Posted celebration on PR #${prNumber}`);
            }
