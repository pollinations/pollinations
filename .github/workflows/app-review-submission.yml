name: App Review Submission

on:
  issues:
    types: [opened, edited, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      issue_author:
        description: 'Issue author username (optional, will be fetched if not provided)'
        required: false
        type: string

concurrency:
  group: app-submission-${{ github.event.issue.number || github.event.inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  app-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name != 'pull_request_target' &&
       ((github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'TIER-APP')) ||
        (github.event_name == 'issues' && github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'TIER-APP-INCOMPLETE')) ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'TIER-APP-INCOMPLETE') && github.event.comment.user.type != 'Bot')) &&
       !contains(github.event.issue.labels.*.name, 'TIER-APP-REVIEW') &&
       !contains(github.event.issue.labels.*.name, 'TIER-APP-APPROVED') &&
       !contains(github.event.issue.labels.*.name, 'TIER-APP-REJECTED') &&
       github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Generate App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Get issue number and author
        id: issue
        run: |
          ISSUE_NUM="${{ github.event.inputs.issue_number || github.event.issue.number }}"
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          
          # For workflow_dispatch, fetch author from API (input takes priority)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.issue_author }}" ]; then
              echo "author=${{ github.event.inputs.issue_author }}" >> "$GITHUB_OUTPUT"
            else
              AUTHOR=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUM --jq .user.login)
              echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "author=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Setup
        id: setup
        run: |
          # Add eyes reaction
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "issues" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true
          fi

          # Get bot user ID
          BOT_USER_ID=$(gh api "/users/${{ steps.token.outputs.app-slug }}[bot]" --jq .id)
          echo "user-id=$BOT_USER_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Install enter dependencies
        run: cd enter.pollinations.ai && npm install

      - name: Check comment author permissions
        id: auth
        if: github.event_name == 'issue_comment'
        run: |
          ASSOCIATION="${{ github.event.comment.author_association }}"
          COMMENT_AUTHOR="${{ github.event.comment.user.login }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"

          if [[ "$ASSOCIATION" == "MEMBER" || "$ASSOCIATION" == "OWNER" || "$ASSOCIATION" == "COLLABORATOR" || "$COMMENT_AUTHOR" == "$ISSUE_AUTHOR" ]]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
            echo "Skipping: $COMMENT_AUTHOR is not authorized (association: $ASSOCIATION, issue author: $ISSUE_AUTHOR)"
          fi

      - name: Skip if unauthorized
        if: github.event_name == 'issue_comment' && steps.auth.outputs.authorized == 'false'
        run: echo "Skipping - commenter not authorized"

      - name: Update issue title
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const body = context.payload.issue.body;
            const appNameMatch = body?.match(/### App Name\s*\n(.*?)(?:\n|$)/);
            const appName = appNameMatch ? appNameMatch[1].trim() : 'App';
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: `[App Submission] ${appName}`
            });

      - name: Validate submission
        id: validate
        if: github.event_name != 'issue_comment' || steps.auth.outputs.authorized == 'true'
        continue-on-error: true
        run: |
          node .github/scripts/app-validate-submission.js > /tmp/validation.json 2>&1 || true
          cat /tmp/validation.json
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/validation.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || '' }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Setup Python
        if: github.event_name != 'issue_comment' || steps.auth.outputs.authorized == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: github.event_name != 'issue_comment' || steps.auth.outputs.authorized == 'true'
        run: pip install requests

      - name: Run App Review Agent
        if: github.event_name != 'issue_comment' || steps.auth.outputs.authorized == 'true'
        run: python .github/scripts/app-review-agent.py
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          POLLINATIONS_API_KEY: ${{ secrets.PLN_GITHUB_POLLY_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          VALIDATION_RESULT: ${{ steps.validate.outputs.result }}

  app-approve:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'TIER-APP-APPROVED' &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Generate App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Get bot identity
        id: setup
        run: |
          BOT_USER_ID=$(gh api "/users/${{ steps.token.outputs.app-slug }}[bot]" --jq .id)
          echo "user-id=$BOT_USER_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse APP_REVIEW_DATA from issue comments
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            // Find the latest bot comment with JSON code block
            const botSlug = '${{ steps.token.outputs.app-slug }}[bot]';
            let rowData = null;
            for (const c of comments.data.reverse()) {
              if (c.user.login === botSlug || c.user.type === 'Bot') {
                const match = c.body.match(/<!-- APP_REVIEW_DATA -->\s*```json\n([\s\S]+?)\n```/);
                if (match) {
                  rowData = match[1].trim();
                  break;
                }
              }
            }

            if (!rowData) {
              core.setFailed('No review data JSON found in bot comments');
              return;
            }

            // Validate it's parseable
            JSON.parse(rowData);
            core.setOutput('row_data', rowData);

      - name: Create branch, update APPS.md, push
        id: branch
        uses: actions/github-script@v7
        env:
          ROW_DATA_JSON: ${{ steps.parse.outputs.row_data }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { execSync } = require('child_process');
            const d = JSON.parse(process.env.ROW_DATA_JSON);
            const today = new Date().toISOString().slice(0, 10);
            const issueNum = context.issue.number;
            const slug = d.name.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').slice(0, 20);
            const branch = `auto/app-${issueNum}-${slug}`;

            const run = (cmd, env) => execSync(cmd, { encoding: 'utf-8', stdio: ['pipe', 'pipe', 'pipe'], env: { ...process.env, ...env } });

            run(`git checkout -b ${branch} origin/main`);

            // Build the row (stars left empty — daily metrics fills it)
            const row = `| ${d.emoji} | ${d.name} | ${d.web_url} | ${d.description} | ${d.language} | ${d.category} | ${d.platform} | ${d.github_username} | ${d.github_user_id} | ${d.repo_url} | | ${d.discord} | | ${d.submitted_date} | ${d.issue_url} | ${today} |  |  |`;

            run('node .github/scripts/app-prepend-row.js', { NEW_ROW: row });
            run('node .github/scripts/app-update-greenhouse.js');

            // Configure git and commit
            const botName = '${{ steps.token.outputs.app-slug }}[bot]';
            const botEmail = '${{ steps.setup.outputs.user-id }}+${{ steps.token.outputs.app-slug }}[bot]@users.noreply.github.com';
            run(`git config user.name "${botName}"`);
            run(`git config user.email "${botEmail}"`);

            const issueAuthor = d.github_username.replace(/^@/, '').replace(/[^a-zA-Z0-9_-]/g, '');
            const safeName = d.name.replace(/["`$\\]/g, '');
            const safeCategory = d.category.replace(/[^a-z_]/g, '');
            run('git add -A');
            run(`git commit -m "Add ${safeName} to ${safeCategory}\n\nCo-authored-by: ${issueAuthor} <${issueAuthor}@users.noreply.github.com>"`);
            run(`git push origin ${branch}`);

            core.setOutput('branch', branch);
            core.setOutput('name', d.name);
            core.setOutput('category', d.category);
            core.setOutput('web_url', d.web_url || d.repo_url);
            core.setOutput('description', d.description);

      - name: Create PR and enable auto-merge
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          NAME="${{ steps.branch.outputs.name }}"
          CATEGORY="${{ steps.branch.outputs.category }}"
          WEB_URL="${{ steps.branch.outputs.web_url }}"
          DESCRIPTION="${{ steps.branch.outputs.description }}"

          PR_URL=$(gh pr create \
            --title "Add ${NAME} to ${CATEGORY}" \
            --body "- Adds [${NAME}](${WEB_URL}) to ${CATEGORY}
          - ${DESCRIPTION}

          Fixes #${ISSUE_NUM}" \
            --head "$BRANCH")

          echo "Created PR: $PR_URL"

          # Enable auto-merge — PR merges automatically once required checks pass
          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
