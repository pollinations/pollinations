name: App Update Metrics

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4am UTC
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate Pollinations AI Token
        id: pollinations-ai
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.pollinations-ai.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "pollinations-ai[bot]"
          git config user.email "pollinations-ai[bot]@users.noreply.github.com"

      - name: Update app metrics
        env:
          GITHUB_TOKEN: ${{ steps.pollinations-ai.outputs.token }}
          TINYBIRD_READ_TOKEN: ${{ secrets.TINYBIRD_READ_TOKEN }}
        run: node .github/scripts/app-update-metrics.js --verbose

      - name: Run health checks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.pollinations-ai.outputs.token }}
        run: node .github/scripts/app-check-links.js --health-update --verbose

      - name: Regenerate greenhouse
        run: node .github/scripts/app-update-greenhouse.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet apps/APPS.md apps/GREENHOUSE.md README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="auto/app-metrics-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add apps/APPS.md apps/GREENHOUSE.md README.md
          git commit -m "chore: update app metrics, health, and greenhouse"
          git push -f origin "$BRANCH"

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.pollinations-ai.outputs.token }}
        run: |
          BRANCH="auto/app-metrics-$(date -u +%Y-%m-%d)"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' || true)

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: $EXISTING_PR"
            PR_URL="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --title "chore: update app metrics $(date -u +%Y-%m-%d)" \
              --body "Daily automated update of app metrics, health checks, and greenhouse")
            echo "Created PR: $PR_URL"
          fi

          gh pr merge "$PR_URL" --auto --squash --delete-branch
