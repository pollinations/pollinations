name: App Upgrade Tier

on:
  pull_request_target:
    types: [closed]
    branches: [main]
    paths:
      - 'apps/APPS.md'

concurrency:
  group: app-upgrade-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # When a maintainer closes an app PR without merging, label the issue as rejected
  handle-rejection:
    if: |
      github.event.pull_request.merged == false &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Label issue as rejected
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(closePattern)];

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['TIER-APP-REJECTED']
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
                console.log(`Rejected and closed issue #${issueNumber}`);
              } catch (e) {
                console.log(`Could not update issue #${issueNumber}: ${e.message}`);
              }
            }

  upgrade-tier:
    # Run when an app submission PR is merged (branch: auto/app-{issue}-{slug})
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Generate pollinations.ai Token
        id: pollinations-ai
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine upgrade targets
        id: targets
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;
            const prBody = context.payload.pull_request.body || '';
            
            // Check if this is an app submission PR (has linked issue)
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const issueMatches = [...prBody.matchAll(closePattern)];
            
            const targets = [];
            const seenUsers = new Set(); // Deduplicate by username
            
            if (issueMatches.length > 0) {
              // App submission: upgrade the issue author, celebrate on issue
              for (const match of issueMatches) {
                const issueNumber = parseInt(match[1]);
                try {
                  const { data: issue } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber
                  });
                  const username = issue.user.login;
                  if (!seenUsers.has(username)) {
                    seenUsers.add(username);
                    targets.push({
                      username: username,
                      celebrateOn: 'issue',
                      targetNumber: issueNumber,
                      type: 'app'
                    });
                  } else {
                    console.log(`Skipping duplicate user: ${username}`);
                  }
                } catch (e) {
                  console.log(`Could not fetch issue #${issueNumber}: ${e.message}`);
                }
              }
            } else {
              // Direct PR: upgrade the PR author, celebrate on PR
              targets.push({
                username: prAuthor,
                celebrateOn: 'pr',
                targetNumber: prNumber,
                type: 'pr'
              });
            }
            
            console.log('Upgrade targets:', JSON.stringify(targets, null, 2));
            core.setOutput('targets', JSON.stringify(targets));
            core.setOutput('pr_number', prNumber);

      - name: Upgrade users to Flower tier
        id: upgrade
        if: steps.targets.outputs.targets != '[]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          npm install -g wrangler
          cd enter.pollinations.ai
          npm install
          
          RESULTS="[]"
          
          for row in $(echo "$TARGETS" | jq -c '.[]'); do
            USERNAME=$(echo "$row" | jq -r '.username')
            TARGET_NUMBER=$(echo "$row" | jq -r '.targetNumber')
            CELEBRATE_ON=$(echo "$row" | jq -r '.celebrateOn')
            TYPE=$(echo "$row" | jq -r '.type')
            
            echo "🌸 Upgrading $USERNAME to flower tier..."
            OUTPUT=$(npx tsx scripts/tier-update-user.ts update-tier \
              --githubUsername "$USERNAME" \
              --tier flower \
              --env production 2>&1) || true
            
            echo "$OUTPUT"
            
            # Check if user already at higher tier (skip silently)
            if echo "$OUTPUT" | grep -q "SKIP_UPGRADE=true"; then
              echo "✅ User $USERNAME already at flower tier or higher - skipping"
              RESULTS=$(echo "$RESULTS" | jq --arg user "$USERNAME" --arg num "$TARGET_NUMBER" --arg on "$CELEBRATE_ON" --arg type "$TYPE" \
                '. + [{"user": $user, "targetNumber": $num, "celebrateOn": $on, "type": $type, "success": "skipped"}]')
            elif echo "$OUTPUT" | grep -q "Tier update complete"; then
              # Verify the tier was actually set correctly in D1
              echo "🔍 Verifying tier upgrade for $USERNAME..."
              VERIFY_OUTPUT=$(npx tsx scripts/tier-update-user.ts verify-tier \
                --githubUsername "$USERNAME" \
                --tier flower \
                --env production 2>&1) || true
              
              echo "$VERIFY_OUTPUT"
              
              if echo "$VERIFY_OUTPUT" | grep -q "VERIFIED=true"; then
                echo "✅ Tier verified for $USERNAME"
                RESULTS=$(echo "$RESULTS" | jq --arg user "$USERNAME" --arg num "$TARGET_NUMBER" --arg on "$CELEBRATE_ON" --arg type "$TYPE" \
                  '. + [{"user": $user, "targetNumber": $num, "celebrateOn": $on, "type": $type, "success": true}]')
              else
                echo "⚠️ Tier verification failed for $USERNAME"
                RESULTS=$(echo "$RESULTS" | jq --arg user "$USERNAME" --arg num "$TARGET_NUMBER" --arg on "$CELEBRATE_ON" --arg type "$TYPE" \
                  '. + [{"user": $user, "targetNumber": $num, "celebrateOn": $on, "type": $type, "success": "unverified"}]')
              fi
            else
              RESULTS=$(echo "$RESULTS" | jq --arg user "$USERNAME" --arg num "$TARGET_NUMBER" --arg on "$CELEBRATE_ON" --arg type "$TYPE" \
                '. + [{"user": $user, "targetNumber": $num, "celebrateOn": $on, "type": $type, "success": false}]')
            fi
          done
          
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post celebration and update labels
        if: steps.upgrade.outputs.results != '[]' && steps.upgrade.outputs.results != ''
        uses: actions/github-script@v7
        env:
          RESULTS_JSON: ${{ steps.upgrade.outputs.results }}
          PR_NUMBER: ${{ steps.targets.outputs.pr_number }}
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const results = JSON.parse(process.env.RESULTS_JSON);
            const prNumber = parseInt(process.env.PR_NUMBER);
            
            for (const result of results) {
              const targetNumber = parseInt(result.targetNumber);
              const isIssue = result.celebrateOn === 'issue';
              
              // Skip if user already at higher tier (no action needed)
              if (result.success === 'skipped') {
                console.log(`Skipping ${result.user} - already at flower tier or higher`);
                continue;
              }
              
              // Handle unverified case - upgrade happened but couldn't verify
              if (result.success === 'unverified') {
                console.log(`⚠️ ${result.user} upgrade unverified - not posting celebration`);
                continue;
              }
              
              if (result.success === true) {
                // === CELEBRATE ON PR (always - for both apps and code) ===
                const prMessage = result.type === 'app'
                  ? `## 🎉 App Added & Verified!\n\nThis PR added **@${result.user}**'s app to the [pollinations.ai showcase](https://pollinations.ai).\n\n### 🌸 Flower Tier Activated!\n\nUser upgraded to **Flower tier** (0.4 pollen/hour).\n\nSee issue #${targetNumber} for full details.`
                  : `## 🎉 Contribution Merged & Verified!\n\nThank you **@${result.user}** for your contribution to pollinations.ai!\n\n### 🌸 Flower Tier Activated!\n\nYou've been upgraded to **Flower tier** which grants you **0.4 pollen per hour**!\n\n⏰ **How it works:** Your pollen balance refills every hour. Unused pollen does not roll over.\n\nCheck your balance at [enter.pollinations.ai](https://enter.pollinations.ai) 🌻`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: prMessage
                });


                // === CELEBRATE ON ISSUE + CLOSE (apps only) ===
                if (isIssue) {
                  const issueMessage = `## 🎉 App Approved & Verified!\n\nYour app has been added to the [pollinations.ai showcase](https://pollinations.ai)!\n\n### 🌸 Flower Tier Activated!\n\n@${result.user}, you've been upgraded to **Flower tier** which grants you **0.4 pollen per hour**!\n\n⏰ **How it works:** Your pollen balance refills every hour. Unused pollen does not roll over.\n\nCheck your balance at [enter.pollinations.ai](https://enter.pollinations.ai)\n\nThank you for contributing to pollinations.ai! 🌻`;

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: targetNumber,
                    body: issueMessage
                  });

                  // Close the issue (Fixes #NNN in PR body also auto-closes, but be explicit)
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: targetNumber,
                    state: 'closed',
                    state_reason: 'completed'
                  });

                  console.log(`✅ Upgraded ${result.user}, posted celebrations, closed issue #${targetNumber}`);
                } else {
                  console.log(`✅ Upgraded ${result.user} and posted celebration on PR`);
                }
              } else {
                // User not registered
                const failMessage = `### ⚠️ Action Required: Claim Your Flower Tier\n\n@${result.user}, your contribution has been merged but we couldn't find your account to upgrade your tier.\n\n**To claim your 🌸 Flower tier (0.4 pollen/hour):**\n1. Sign up at [enter.pollinations.ai](https://enter.pollinations.ai) using GitHub\n2. Reply to this ${isIssue ? 'issue' : 'PR'} once you've signed up\n\nWe'll upgrade your tier once you're registered. Thanks for contributing! 🌻`;
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: targetNumber,
                  body: failMessage
                });
                
                // Add INCOMPLETE label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: targetNumber,
                  labels: ['TIER-APP-INCOMPLETE']
                });
                
                console.log(`⚠️ User ${result.user} not registered, posted reminder`);
              }
            }
