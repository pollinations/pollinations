name: App Upgrade Tier

on:
  pull_request_target:
    types: [closed]
    branches: [main]
    paths:
      - 'apps/APPS.md'

concurrency:
  group: app-upgrade-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # When a maintainer closes an app PR without merging, label the issue as rejected
  handle-rejection:
    if: |
      github.event.pull_request.merged == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate App Token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Label issue as rejected
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(closePattern)];

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['TIER-APP-REJECTED']
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
                console.log(`Rejected and closed issue #${issueNumber}`);
              } catch (e) {
                console.log(`Could not update issue #${issueNumber}: ${e.message}`);
              }
            }

  celebrate:
    # Run when an app submission PR is merged (branch: auto/app-{issue}-{slug})
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'auto/app-') &&
      !startsWith(github.event.pull_request.head.ref, 'auto/app-metrics')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Generate pollinations.ai Token
        id: pollinations-ai
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Post celebration and close issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.pollinations-ai.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const prNumber = pr.number;
            const prAuthor = pr.user.login;

            // Find linked issue from PR body
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(closePattern)];

            // Post celebration on PR
            const prMessage = matches.length > 0
              ? `## 🎉 App Added & Verified!\n\nThis PR added **@${prAuthor}**'s app to the [pollinations.ai showcase](https://pollinations.ai).\n\nSee issue #${matches[0][1]} for full details.`
              : `## 🎉 Contribution Merged & Verified!\n\nThank you **@${prAuthor}** for your contribution to pollinations.ai!\n\nCheck out the [showcase](https://pollinations.ai) for more apps!`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: prMessage
            });

            // Post on linked issue and close it
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                const issueMessage = `## 🎉 App Approved & Verified!\n\nYour app has been added to the [pollinations.ai showcase](https://pollinations.ai)!\n\nThank you for contributing to pollinations.ai! 🌻`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: issueMessage
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed'
                });

                console.log(`✅ Posted celebration, closed issue #${issueNumber}`);
              } catch (e) {
                console.log(`Could not update issue #${issueNumber}: ${e.message}`);
              }
            }
