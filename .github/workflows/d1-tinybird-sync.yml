name: Daily D1 → Tinybird Sync

on:
  schedule:
    # Run at 03:00 UTC daily
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: d1-tinybird-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        datasource:
          - d1_user
          - d1_apikey
          - d1_community_model
          - d1_session
          - d1_account

    steps:
      - name: Sync ${{ matrix.datasource }}
        env:
          DATASOURCE: ${{ matrix.datasource }}
          EXPORT_TOKEN: ${{ secrets.D1_EXPORT_TOKEN }}
          TINYBIRD_TOKEN: ${{ secrets.TINYBIRD_SYNC_TOKEN }}
          TINYBIRD_HOST: https://api.europe-west2.gcp.tinybird.co
        run: |
          set -euo pipefail

          synced_at=$(date -u "+%Y-%m-%d %H:%M:%S")
          snapshot="$RUNNER_TEMP/$DATASOURCE.ndjson"
          page_file="$RUNNER_TEMP/$DATASOURCE-page.json"
          cursor=""
          total_rows=0
          pages=0
          : > "$snapshot"

          while true; do
            pages=$((pages + 1))
            if [ "$pages" -gt 1000 ]; then
              echo "::error::$DATASOURCE exceeded 1000 pages"
              exit 1
            fi

            payload=$(jq -n \
              --arg datasource "$DATASOURCE" \
              --arg cursor "$cursor" \
              '{datasource: $datasource}
               + if $cursor == "" then {} else {cursor: $cursor} end')

            http_code=$(curl -sS --max-time 180 -o "$page_file" -w "%{http_code}" \
              -X POST "https://enter.pollinations.ai/api/admin/trigger-d1-sync" \
              -H "Authorization: Bearer $EXPORT_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$payload")

            if [ "$http_code" != "200" ]; then
              echo "::error::$DATASOURCE page $pages failed with HTTP $http_code"
              exit 1
            fi
            if ! jq -e \
              '.success == true and (.rows | type == "array") and (.done | type == "boolean")' \
              "$page_file" \
              >/dev/null; then
              echo "::error::$DATASOURCE page $pages returned an invalid response"
              exit 1
            fi

            rows=$(jq '.rows | length' "$page_file")
            total_rows=$((total_rows + rows))
            jq -c --arg synced_at "$synced_at" \
              '.rows[] + {synced_at: $synced_at}' "$page_file" >> "$snapshot"
            done=$(jq -r '.done' "$page_file")
            echo "$DATASOURCE page $pages: $rows rows"

            if [ "$done" = "true" ]; then
              break
            fi

            cursor=$(jq -r '.next_cursor // empty' "$page_file")
            if [ -z "$cursor" ]; then
              echo "::error::$DATASOURCE page $pages did not return next_cursor"
              exit 1
            fi
          done

          if [ "$total_rows" -eq 0 ]; then
            echo "::error::$DATASOURCE export was empty; keeping the existing Tinybird snapshot"
            exit 1
          fi

          import_file="$RUNNER_TEMP/$DATASOURCE-import.json"
          http_code=$(curl -sS --max-time 300 -o "$import_file" -w "%{http_code}" \
            -X POST "$TINYBIRD_HOST/v0/datasources?name=$DATASOURCE&mode=replace&format=ndjson" \
            -H "Authorization: Bearer $TINYBIRD_TOKEN" \
            -F "ndjson=@$snapshot;type=application/x-ndjson")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::$DATASOURCE replacement failed with HTTP $http_code"
            exit 1
          fi

          job_id=$(jq -r '.job_id // .import_id // .id // empty' "$import_file")
          if [ -z "$job_id" ]; then
            echo "::error::$DATASOURCE replacement did not return a job ID"
            exit 1
          fi

          for poll in $(seq 1 180); do
            job_file="$RUNNER_TEMP/$DATASOURCE-job.json"
            http_code=$(curl -sS --max-time 30 -o "$job_file" -w "%{http_code}" \
              "$TINYBIRD_HOST/v0/jobs/$job_id" \
              -H "Authorization: Bearer $TINYBIRD_TOKEN")
            if [ "$http_code" != "200" ]; then
              echo "::error::$DATASOURCE job check failed with HTTP $http_code"
              exit 1
            fi

            status=$(jq -r '.status // empty' "$job_file")
            if [ "$status" = "done" ]; then
              imported_rows=$(jq -r '.statistics.row_count // -1' "$job_file")
              quarantine_rows=$(jq -r '.quarantine_rows // -1' "$job_file")
              invalid_lines=$(jq -r '.invalid_lines // -1' "$job_file")
              if [ "$imported_rows" -ne "$total_rows" ] || \
                 [ "$quarantine_rows" -ne 0 ] || [ "$invalid_lines" -ne 0 ]; then
                echo "::error::$DATASOURCE validation failed: expected=$total_rows imported=$imported_rows quarantined=$quarantine_rows invalid=$invalid_lines"
                exit 1
              fi
              echo "::notice::$DATASOURCE replaced atomically: $total_rows rows across $pages pages"
              exit 0
            fi
            if [ "$status" = "error" ] || [ "$status" = "cancelled" ]; then
              echo "::error::$DATASOURCE replacement job $status"
              exit 1
            fi
            if [ "$status" != "waiting" ] && [ "$status" != "working" ] && \
               [ "$status" != "cancelling" ]; then
              echo "::error::$DATASOURCE replacement job returned status '$status'"
              exit 1
            fi
            sleep 5
          done

          echo "::error::$DATASOURCE replacement job timed out"
          exit 1
