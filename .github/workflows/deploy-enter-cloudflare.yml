name: Deploy / enter.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'enter.pollinations.ai/**'
      - 'shared/**'
      - 'packages/sdk/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-enter-cloudflare.yml'
  workflow_dispatch:

concurrency:
  # Per-workflow group: a shared group lets GitHub cancel queued sibling
  # deploys when several workflows fire on the same production push.
  group: pollinations-cloudflare-production-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install root dependencies
        run: npm ci

      - name: Run database migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
        run: npm run migrate:production --workspace pollinations-enter

      - name: Build and deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
        run: npm run deploy:production --workspace pollinations-enter
