name: Deploy to enter-services

on:
  push:
    branches:
      - production
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - name: Decrypt .env files with SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -f "image.pollinations.ai/secrets/env.json" ]; then
            sops --output-type dotenv -d image.pollinations.ai/secrets/env.json > image.pollinations.ai/.env
            echo "✅ Decrypted image.pollinations.ai/.env"
          fi

      - name: Copy .env files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ENTER_SERVICES_STAGING_HOST }}
          username: ${{ secrets.ENTER_SERVICES_STAGING_USER }}
          key: ${{ secrets.ENTER_SERVICES_STAGING_SSH_KEY }}
          source: "image.pollinations.ai/.env"
          target: "/home/ubuntu/pollinations/"
          strip_components: 0

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ENTER_SERVICES_STAGING_HOST }}
          username: ${{ secrets.ENTER_SERVICES_STAGING_USER }}
          key: ${{ secrets.ENTER_SERVICES_STAGING_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying to STAGING..."
            
            # Secure .env file permissions (prevent world-readable secrets)
            chmod 600 /home/ubuntu/pollinations/image.pollinations.ai/.env 2>/dev/null || true
            echo "🔒 Secured .env file permissions"
            
            cd /home/ubuntu/pollinations
            git pull origin staging
            
            cd image.pollinations.ai
            pnpm install --frozen-lockfile || pnpm install
            
            sudo systemctl restart image-pollinations.service
            sleep 10
            
            sudo systemctl is-active image-pollinations.service || exit 1
            
            echo "🎉 Staging deployment complete!"

  deploy-production:
    if: github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - name: Decrypt .env files with SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          # Decrypt .encrypted.env files to .env
          if [ -f "image.pollinations.ai/secrets/env.json" ]; then
            sops --output-type dotenv -d image.pollinations.ai/secrets/env.json > image.pollinations.ai/.env
            echo "✅ Decrypted image.pollinations.ai/.env"
          fi

      - name: Copy decrypted .env files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ENTER_SERVICES_HOST }}
          username: ${{ secrets.ENTER_SERVICES_USER }}
          key: ${{ secrets.ENTER_SERVICES_SSH_KEY }}
          source: "image.pollinations.ai/.env"
          target: "/home/ubuntu/pollinations/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ENTER_SERVICES_HOST }}
          username: ${{ secrets.ENTER_SERVICES_USER }}
          key: ${{ secrets.ENTER_SERVICES_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Starting deployment to enter-services..."
            
            # Secure .env file permissions (prevent world-readable secrets)
            chmod 600 /home/ubuntu/pollinations/image.pollinations.ai/.env 2>/dev/null || true
            echo "🔒 Secured .env file permissions"
            
            # Navigate to repo
            cd /home/ubuntu/pollinations
            
            # Pull latest changes
            echo "📥 Pulling latest changes..."
            git pull origin production
            
            # Update image service
            echo "🖼️  Updating image.pollinations.ai..."
            cd image.pollinations.ai
            pnpm install --frozen-lockfile || pnpm install
            echo "✅ Image service dependencies installed"
            
            # Restart systemd services
            echo "🔄 Restarting systemd services..."
            sudo systemctl restart image-pollinations.service
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to start..."
            sleep 10
            
            # Verify services are running
            echo "✅ Verifying service status..."
            sudo systemctl is-active image-pollinations.service || exit 1
            
            # Health check endpoints (no token needed - just verify services respond)
            echo "🏥 Running health checks..."
            sleep 2  # Give services a moment to fully initialize
            
            # Check image service health - any HTTP response means service is up
            IMAGE_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:16384/ || echo "000")
            if [ "$IMAGE_HEALTH" = "000" ]; then
              echo "❌ Image service not responding"
              exit 1
            fi
            echo "✅ Image service responding (HTTP $IMAGE_HEALTH)"
            
            echo "🎉 Deployment complete!"
            echo "📊 Service Status:"
            sudo systemctl status image-pollinations.service --no-pager | grep -E "Active:|running"
