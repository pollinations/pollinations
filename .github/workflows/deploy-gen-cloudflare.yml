name: Deploy gen.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'gen.pollinations.ai/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-gen-cloudflare.yml'
  workflow_dispatch:

concurrency:
  group: pollinations-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --workspace pollinations-gen

      - name: Typecheck
        run: npm run typecheck --workspace pollinations-gen

      - name: Run database migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run migrate:production --workspace pollinations-enter

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - name: Push generation secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run push-secrets:production --workspace pollinations-gen

      - name: Apply R2 lifecycle rules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run apply-lifecycle:production --workspace pollinations-gen

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:production --workspace pollinations-gen
