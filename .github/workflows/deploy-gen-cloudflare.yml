name: Deploy / gen.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'gen.pollinations.ai/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-gen-cloudflare.yml'
  workflow_dispatch:
    inputs:
      sync_production_secrets:
        description: 'Synchronize encrypted production secrets (requires approval)'
        required: false
        default: false
        type: boolean

concurrency:
  group: pollinations-cloudflare-production
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      sync_production_secrets: ${{ steps.secret-changes.outputs.sync }}
      deployment_environment: ${{ steps.secret-changes.outputs.environment }}
    steps:
      - name: Require the production branch
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/production" ]]; then
            echo "::error::Production deployments must run from the production branch."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect production secret synchronization
        id: secret-changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          MANUAL_SECRET_SYNC: ${{ inputs.sync_production_secrets }}
        run: |
          sync=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            sync="$MANUAL_SECRET_SYNC"
          elif ! git diff --quiet "$BEFORE_SHA" "$GITHUB_SHA" -- \
            gen.pollinations.ai/secrets/prod.vars.json; then
            sync=true
          fi

          echo "sync=$sync" >> "$GITHUB_OUTPUT"
          if [[ "$sync" == "true" ]]; then
            echo "environment=production-secrets" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    # The production-secrets environment is restricted to the production branch
    # and requires manual approval from its configured reviewer.
    environment: ${{ needs.preflight.outputs.deployment_environment }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --workspace pollinations-gen

      - name: Typecheck
        run: npm run typecheck --workspace pollinations-gen

      - name: Run database migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_GEN }}
        run: npm run migrate:production --workspace pollinations-enter

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      # Deploy BEFORE pushing secrets: a fresh `wrangler deploy` makes the
      # latest worker version the deployed one. `wrangler secret bulk` edits
      # the latest version's settings and fails (Cloudflare 10214) if that
      # version isn't deployed — which happens after a manual version upload or
      # rollback. Deploying first guarantees latest == deployed so the secret
      # push can never hit that state. A brand-new secret is briefly missing in
      # the few seconds between deploy and push, which self-heals.
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_GEN }}
        run: npm run deploy:production --workspace pollinations-gen

      - name: Push generation secrets
        if: needs.preflight.outputs.sync_production_secrets == 'true'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_GEN }}
        run: npm run push-secrets:production --workspace pollinations-gen

      - name: Apply R2 lifecycle rules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_GEN }}
        run: npm run apply-lifecycle:production --workspace pollinations-gen
