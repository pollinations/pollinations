name: Deploy / media.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'media.pollinations.ai/**'
      # The worker imports shared/ modules and queries tables migrated from
      # enter's drizzle dir — redeploy on either so code and schema move together.
      - 'shared/**'
      - 'enter.pollinations.ai/drizzle/**'
      - '.github/workflows/deploy-media-cloudflare.yml'
  workflow_dispatch:

concurrency:
  # Per-workflow group: a shared group lets GitHub cancel queued sibling
  # deploys when several workflows fire on the same production push.
  group: pollinations-cloudflare-production-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install shared dependencies
        run: npm install --workspace shared --include-workspace-root=false

      - name: Install media dependencies
        run: npm install
        working-directory: ./media.pollinations.ai

      - name: Test
        run: npm test
        working-directory: ./media.pollinations.ai

      - name: Apply R2 lifecycle rules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
        run: npm run apply-lifecycle:production
        working-directory: ./media.pollinations.ai

      # The worker queries media catalog tables in enter's D1 — enter/gen
      # workflows also apply these migrations, but the three deploy workflows
      # have no ordering guarantee between them, so apply before deploying
      # rather than assuming enter ran first. `d1 migrations apply` is
      # idempotent (already-applied files are skipped).
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
        run: npm run migrate:production
        working-directory: ./media.pollinations.ai

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
        run: npm run deploy:production
        working-directory: ./media.pollinations.ai
