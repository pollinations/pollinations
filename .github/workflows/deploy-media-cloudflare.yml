name: Deploy media.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'media.pollinations.ai/**'
      - '.github/workflows/deploy-media-cloudflare.yml'
  workflow_dispatch:

# Match the other Cloudflare deploys so concurrent pushes don't race the
# wrangler API. Group is shared with gen/enter so a flurry of merges queues
# rather than fights for the same Workers control plane.
concurrency:
  group: pollinations-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: ./media.pollinations.ai

      - name: Test
        run: npm test
        working-directory: ./media.pollinations.ai

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:production
        working-directory: ./media.pollinations.ai
