name: Deploy media.pollinations.ai

on:
  push:
    branches:
      - production
    paths:
      - 'media.pollinations.ai/**'
      - '.github/workflows/deploy-media-cloudflare.yml'
  workflow_dispatch:
    inputs:
      migrate_r2:
        description: "Migrate the old Pollinations R2 bucket into the Myceli R2 bucket after deploy"
        required: false
        type: boolean
        default: false
      migration_mode:
        description: "R2 migration action"
        required: false
        type: choice
        default: start
        options:
          - precheck
          - start
          - status
          - wait
      migration_job_id:
        description: "Existing Super Slurper job id for status/wait"
        required: false
        type: string

concurrency:
  group: pollinations-cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: ./media.pollinations.ai

      - name: Test
        run: npm test
        working-directory: ./media.pollinations.ai

      - name: Apply R2 lifecycle rules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
        run: npm run apply-lifecycle:production
        working-directory: ./media.pollinations.ai

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
        run: npm run deploy:production
        working-directory: ./media.pollinations.ai

      - name: Migrate R2 bucket to Myceli
        if: github.event_name == 'workflow_dispatch' && inputs.migrate_r2
        env:
          CLOUDFLARE_API_TOKEN_SOURCE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID_SOURCE: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN_TARGET: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID_TARGET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          MIGRATION_MODE: ${{ inputs.migration_mode }}
          MIGRATION_JOB_ID: ${{ inputs.migration_job_id }}
        run: npm run migrate-r2:myceli
        working-directory: ./media.pollinations.ai
