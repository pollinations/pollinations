name: Deploy / Polli Discord bot

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'apps/polli/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: apps/polli

      - name: Copy source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DISCORD_POLLY_HOST }}
          username: ${{ secrets.DISCORD_POLLY_USER }}
          key: ${{ secrets.DISCORD_POLLY_SSH_KEY }}
          source: "apps/polli/"
          target: "/tmp/polli-deploy"
          strip_components: 2
          overwrite: true

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DISCORD_POLLY_HOST }}
          username: ${{ secrets.DISCORD_POLLY_USER }}
          key: ${{ secrets.DISCORD_POLLY_SSH_KEY }}
          script: |
            set -e

            # Runtime paths stay 'polly': the deployed host has /root/polly and
            # polly.service already provisioned. Renaming those is a separate
            # migration, not part of the source-level rename.
            echo "Syncing source to /root/polly..."
            rsync -av \
              --exclude '.env' \
              --exclude 'data/' \
              --exclude 'venv/' \
              --exclude '.git/' \
              --exclude '*.pem' \
              --exclude 'src/extensions/' \
              /tmp/polli-deploy/ /root/polly/

            echo "Installing dependencies..."
            cd /root/polly
            ./venv/bin/python -m pip install -r requirements.txt -q

            systemctl daemon-reload

            echo "Restarting polly service..."
            systemctl restart polly.service
            sleep 5

            systemctl is-active polly.service || exit 1
            echo "Polli bot deployed successfully"

            rm -rf /tmp/polli-deploy
