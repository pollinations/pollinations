name: Deploy Portkey Gateway

on:
  push:
    branches:
      - production
    paths:
      - 'gen.pollinations.ai/scripts/deploy-portkey.sh'
      - '.github/workflows/deploy-portkey-gateway.yml'
  workflow_dispatch:
    inputs:
      commit:
        description: 'Portkey gateway commit SHA (leave empty for default)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Portkey Gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          PORTKEY_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          PORTKEY_PRODUCTION_HOST: portkey.myceli.ai
          PORTKEY_PRODUCTION_ZONE: myceli.ai
          PORTKEY_COMMIT: ${{ github.event.inputs.commit }}
          PORTKEY_ENV: production
        run: |
          chmod +x ./gen.pollinations.ai/scripts/deploy-portkey.sh
          ./gen.pollinations.ai/scripts/deploy-portkey.sh
