name: Regenerate API Docs

on:
  push:
    branches:
      - main
    paths:
      - 'enter.pollinations.ai/src/routes/docs.ts'
      - 'enter.pollinations.ai/src/routes/**/*.ts'
      - 'enter.pollinations.ai/scripts/generate-apidocs.ts'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to regenerate docs from'
        required: false
        default: main
      create_pr:
        description: 'Create a docs PR if APIDOCS.md changes'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - regenerate-apidocs

jobs:
  regenerate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.event.client_payload.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: enter.pollinations.ai
        run: npm ci

      - name: Regenerate APIDOCS.md
        working-directory: enter.pollinations.ai
        run: npx tsx scripts/generate-apidocs.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet APIDOCS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with updated docs
        if: ${{ steps.changes.outputs.changed == 'true' && (github.event_name == 'push' || inputs.create_pr || github.event.client_payload.create_pr) }}
        run: |
          BRANCH="docs/regenerate-apidocs-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add APIDOCS.md
          git commit -m "docs: regenerate APIDOCS.md"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: regenerate APIDOCS.md" \
            --body "Auto-generated from OpenAPI spec changes." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
