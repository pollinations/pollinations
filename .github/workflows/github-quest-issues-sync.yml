name: GitHub Quest Issues Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  issues: read
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Polly Bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}
          owner: pollinations

      - name: Checkout trusted code
        uses: actions/checkout@v4

      - name: Resolve GitHub quest issues
        id: resolve
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { syncGitHubQuestIssues } = require('./.github/scripts/quest-reward-payout.js');
            await syncGitHubQuestIssues({ github, context, core });

      - name: Record GitHub quest issues
        if: steps.resolve.outputs.questIssues != ''
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          QUEST_ISSUES: ${{ steps.resolve.outputs.questIssues }}
        with:
          script: |
            const { runQuestIssueSync } = require('./.github/scripts/quest-reward-payout.js');
            await runQuestIssueSync({ core });
