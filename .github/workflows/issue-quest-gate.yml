name: Quest Issue Gate

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'POLLEN-QUEST')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'POLLEN-QUEST')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const action = context.payload.action;
            const issue = context.payload.issue;
            const actor = action === 'opened'
                ? issue.user.login
                : context.payload.sender.login;

            let roleName = 'none';
            try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    username: actor,
                });
                roleName = data.role_name ?? data.permission ?? 'none';
            } catch (error) {
                if (error.status !== 404) throw error;
            }

            const isMaintainer = roleName === 'admin' || roleName === 'maintain';
            if (isMaintainer) return;

            await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'POLLEN-QUEST',
            }).catch((e) => {
                if (e.status !== 404) throw e;
            });

            const body = [
                `Hi @${actor} — thanks for the contribution!`,
                ``,
                `The **Community Quest** template is reserved for Pollinations maintainers, since quests carry a Pollen reward paid on PR merge. I've removed the **POLLEN-QUEST** label, but your issue stays open as a regular request.`,
                ``,
                `If you'd like to **propose** a quest, please open a blank issue describing the work and tag any of the [Pollinations org members](https://github.com/orgs/pollinations/people) — a maintainer can review and convert it into an official quest if it's a good fit.`,
                ``,
                `To **take on** an existing quest, browse them here: https://github.com/pollinations/pollinations/issues?q=is%3Aissue+is%3Aopen+label%3APOLLEN-QUEST`,
            ].join('\n');

            await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
            });
