name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - "packages/ui/**"
      - "packages/mcp/**"
      - "packages/polli-cli/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sdk: ${{ steps.changes.outputs.sdk }}
      ui: ${{ steps.changes.outputs.ui }}
      mcp: ${{ steps.changes.outputs.mcp }}
      cli: ${{ steps.changes.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changes
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            changed=$(git diff --name-only HEAD~1 HEAD)
          else
            changed=$(git diff --name-only "$before" "$GITHUB_SHA")
          fi
          echo "sdk=$(echo "$changed" | grep -q '^packages/sdk/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "ui=$(echo "$changed" | grep -q '^packages/ui/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "mcp=$(echo "$changed" | grep -q '^packages/mcp/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "cli=$(echo "$changed" | grep -q '^packages/polli-cli/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$changed" | grep '^packages/' || true

  publish-sdk:
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies & build
        working-directory: packages/sdk
        run: |
          npm ci
          npm run build

      - name: Check if version already published
        id: check
        working-directory: packages/sdk
        run: |
          name=$(node -p "require('./package.json').name")
          v=$(node -p "require('./package.json').version")
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "Version $v already on npm — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/sdk
        run: |
          v=$(node -p "require('./package.json').version")
          tag=latest
          case "$v" in *-*) tag="${v#*-}"; tag="${tag%%.*}";; esac
          echo "Publishing $v under dist-tag: $tag"
          npm publish --access public --tag "$tag"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ui:
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build --workspace @pollinations/sdk
          npm run build --workspace @pollinations/ui

      - name: Check if version already published
        id: check
        working-directory: packages/ui
        run: |
          name=$(node -p "require('./package.json').name")
          v=$(node -p "require('./package.json').version")
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "Version $v already on npm — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/ui
        run: |
          v=$(node -p "require('./package.json').version")
          tag=latest
          case "$v" in *-*) tag="${v#*-}"; tag="${tag%%.*}";; esac
          echo "Publishing $v under dist-tag: $tag"
          npm publish --access public --tag "$tag"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    needs: detect-changes
    if: needs.detect-changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: packages/mcp
        run: npm ci --ignore-scripts

      - name: Check if version already published
        id: check
        working-directory: packages/mcp
        run: |
          name=$(node -p "require('./package.json').name")
          v=$(node -p "require('./package.json').version")
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "Version $v already on npm — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies & build
        working-directory: packages/polli-cli
        run: |
          npm ci
          npm run build

      - name: Check if version already published
        id: check
        working-directory: packages/polli-cli
        run: |
          name=$(node -p "require('./package.json').name")
          v=$(node -p "require('./package.json').version")
          if npm view "$name@$v" version >/dev/null 2>&1; then
            echo "Version $v already on npm — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/polli-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
