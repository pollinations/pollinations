name: Quest Reward Payout

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  payout:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'POLLEN-QUEST')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve quest payouts
        id: resolve
        uses: actions/github-script@v7
        env:
          AUTHOR_CUT_PERCENT: ${{ vars.QUEST_AUTHOR_CUT_PERCENT || '15' }}
        with:
          script: |
            const AUTHOR_CUT_PERCENT = Number(process.env.AUTHOR_CUT_PERCENT);
            if (!Number.isFinite(AUTHOR_CUT_PERCENT) || AUTHOR_CUT_PERCENT < 0 || AUTHOR_CUT_PERCENT > 100) {
                core.setFailed(`QUEST_AUTHOR_CUT_PERCENT must be 0–100, got: ${process.env.AUTHOR_CUT_PERCENT}`);
                return;
            }

            const pr = context.payload.pull_request;
            const prBody = pr.body || '';
            const closePattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const issueNumbers = [...new Set([...prBody.matchAll(closePattern)].map(m => Number(m[1])))];

            if (issueNumbers.length === 0) {
                core.notice('No Fixes/Closes references in PR body — nothing to pay out.');
                core.setOutput('payouts', '[]');
                return;
            }

            // Reward looks like "20 Pollen" / "20" / "20.5 Pollen" anywhere on the Reward field.
            const parseReward = (body) => {
                const m = body.match(/###\s*Reward\s*\n+\s*([0-9]+(?:\.[0-9]+)?)/i);
                return m ? Number(m[1]) : null;
            };

            const payouts = [];
            const flags = [];

            for (const num of issueNumbers) {
                const { data: issue } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                });

                const labels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
                if (!labels.includes('POLLEN-QUEST')) {
                    core.info(`#${num} is not a POLLEN-QUEST — skipping.`);
                    continue;
                }

                const author = issue.user?.login;
                const assignees = (issue.assignees || []).map(a => a.login);
                const reward = parseReward(issue.body || '');

                const missing = [];
                if (!author) missing.push('issue author');
                if (assignees.length === 0) missing.push('assignee');
                if (assignees.length > 1) missing.push(`single assignee (found ${assignees.length})`);
                if (reward === null || !Number.isFinite(reward) || reward <= 0) missing.push('valid reward amount in issue body');

                if (missing.length > 0) {
                    flags.push({ issue: num, reason: missing.join(', '), author, assignees, reward });
                    continue;
                }

                const assignee = assignees[0];
                if (assignee === author) {
                    payouts.push({ issue: num, recipient: author, amount: reward, role: 'author+assignee' });
                } else {
                    const authorCut = Math.round(reward * AUTHOR_CUT_PERCENT) / 100;
                    const assigneeCut = Math.round((reward - authorCut) * 100) / 100;
                    payouts.push({ issue: num, recipient: author, amount: authorCut, role: 'author' });
                    payouts.push({ issue: num, recipient: assignee, amount: assigneeCut, role: 'assignee' });
                }
            }

            for (const f of flags) {
                const lines = [
                    `@Circuit-Overtime — quest payout could not be auto-processed for this issue.`,
                    ``,
                    `**Missing:** ${f.reason}`,
                    `- author: ${f.author ?? '(none)'}`,
                    `- assignees: ${f.assignees.length ? f.assignees.join(', ') : '(none)'}`,
                    `- parsed reward: ${f.reward ?? '(unparsed)'}`,
                    ``,
                    `Triggered by merge of #${pr.number}. Please review and back-fill the credit manually.`,
                ];
                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: f.issue,
                    body: lines.join('\n'),
                });
            }

            core.setOutput('payouts', JSON.stringify(payouts));
            core.setOutput('cut_percent', String(AUTHOR_CUT_PERCENT));

      - uses: actions/checkout@v4
        if: steps.resolve.outputs.payouts != '' && steps.resolve.outputs.payouts != '[]'

      - name: Grant Pollen via D1
        if: steps.resolve.outputs.payouts != '' && steps.resolve.outputs.payouts != '[]'
        id: grant
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYOUTS: ${{ steps.resolve.outputs.payouts }}
        run: |
          set -e
          cd enter.pollinations.ai
          npm install

          RESULTS="[]"
          for row in $(echo "$PAYOUTS" | jq -c '.[]'); do
              ISSUE=$(echo "$row" | jq -r '.issue')
              USER=$(echo "$row" | jq -r '.recipient')
              AMOUNT=$(echo "$row" | jq -r '.amount')
              ROLE=$(echo "$row" | jq -r '.role')

              echo "→ granting $AMOUNT Pollen to @$USER ($ROLE) for #$ISSUE"
              set +e
              OUT=$(npx tsx src/tier-progression/shared/quest-grant-pollen.ts grant \
                  --githubUsername "$USER" --amount "$AMOUNT" --env production 2>&1)
              RC=$?
              set -e
              echo "$OUT"

              if [ $RC -eq 0 ]; then
                  STATUS="granted"
              elif [ $RC -eq 2 ]; then
                  STATUS="not_found"
              else
                  STATUS="error"
              fi

              RESULTS=$(echo "$RESULTS" | jq -c \
                  --argjson issue "$ISSUE" --arg user "$USER" \
                  --argjson amount "$AMOUNT" --arg role "$ROLE" --arg status "$STATUS" \
                  '. + [{issue:$issue, user:$user, amount:$amount, role:$role, status:$status}]')
          done

          echo "results=$RESULTS" >> "$GITHUB_OUTPUT"

      - name: Comment payout summary on quest issues
        if: steps.grant.outputs.results
        uses: actions/github-script@v7
        env:
          RESULTS: ${{ steps.grant.outputs.results }}
          CUT_PERCENT: ${{ steps.resolve.outputs.cut_percent }}
        with:
          script: |
            const results = JSON.parse(process.env.RESULTS);
            const cutPct = process.env.CUT_PERCENT;
            const byIssue = {};
            for (const r of results) (byIssue[r.issue] ||= []).push(r);

            for (const [issue, rows] of Object.entries(byIssue)) {
                const granted = rows.filter(r => r.status === 'granted');
                const notFound = rows.filter(r => r.status === 'not_found');
                const errored = rows.filter(r => r.status === 'error');

                const lines = [`### 🌸 Quest reward paid out`, ``];
                for (const r of granted) {
                    lines.push(`- **${r.amount}** Pollen → @${r.user} (${r.role})`);
                }
                if (notFound.length) {
                    lines.push(``, `@Circuit-Overtime — these recipients are not registered at enter.pollinations.ai, please back-fill manually:`);
                    for (const r of notFound) lines.push(`- @${r.user} (${r.role}): ${r.amount} Pollen`);
                }
                if (errored.length) {
                    lines.push(``, `@Circuit-Overtime — D1 grant failed for:`);
                    for (const r of errored) lines.push(`- @${r.user} (${r.role}): ${r.amount} Pollen`);
                }
                lines.push(``, `Author cut: ${cutPct}% (set via repo variable \`QUEST_AUTHOR_CUT_PERCENT\`).`);

                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: Number(issue),
                    body: lines.join('\n'),
                });
            }
