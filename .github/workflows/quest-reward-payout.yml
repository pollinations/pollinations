name: Quest Reward Payout

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

env:
  QUEST_PROJECT_ID: PVT_kwDOBS76fs4BW8uW
  QUEST_PAYOUT_FALLBACK: ${{ vars.QUEST_PAYOUT_FALLBACK || 'Circuit-Overtime' }}

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Polly Bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}
          owner: pollinations

      - uses: actions/checkout@v4

      - name: Resolve linked quest
        id: linked
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { resolveLinkedQuest } = require('./.github/scripts/quest-reward-payout.js');
            await resolveLinkedQuest({ github, context, core });

      - name: Set quest status (In Review / Reward Ready)
        if: steps.linked.outputs.quest != '' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
        uses: actions/github-script@v7
        env:
          QUEST: ${{ steps.linked.outputs.quest }}
          PROJECT_ID: ${{ env.QUEST_PROJECT_ID }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { setQuestStatus } = require('./.github/scripts/quest-reward-payout.js');
            await setQuestStatus({ github, context, core });

      - name: Compute payout
        if: github.event.action == 'closed' && github.event.pull_request.merged == true && steps.linked.outputs.quest != ''
        id: resolve
        uses: actions/github-script@v7
        env:
          QUEST: ${{ steps.linked.outputs.quest }}
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { computePayout } = require('./.github/scripts/quest-reward-payout.js');
            await computePayout({ github, context, core });

      - name: Grant Pollen via D1
        if: steps.resolve.outputs.payout != ''
        id: grant
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYOUT: ${{ steps.resolve.outputs.payout }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const { runPollenGrant } = require('./.github/scripts/quest-reward-payout.js');
            await runPollenGrant({ core });

      - name: Mark Paid Out and comment summary
        if: steps.grant.outputs.result != ''
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.grant.outputs.result }}
          QUEST: ${{ steps.linked.outputs.quest }}
          PROJECT_ID: ${{ env.QUEST_PROJECT_ID }}
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { markPaidOutAndComment } = require('./.github/scripts/quest-reward-payout.js');
            await markPaidOutAndComment({ github, context, core });
