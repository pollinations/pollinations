name: Quest Reward Payout

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

env:
  QUEST_PAYOUT_FALLBACK: ${{ vars.QUEST_PAYOUT_FALLBACK || 'Circuit-Overtime' }}

jobs:
  payout:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate Polly Bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}
          owner: pollinations

      - name: Checkout trusted base code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Evaluate quest payouts
        id: resolve
        uses: actions/github-script@v7
        env:
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { evaluateQuestPayouts } = require('./.github/scripts/quest-reward-payout.js');
            await evaluateQuestPayouts({ github, context, core });

      - name: Grant Pollen via D1
        if: steps.resolve.outputs.payouts != ''
        id: grant
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          PAYOUTS: ${{ steps.resolve.outputs.payouts }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const { runPollenGrant } = require('./.github/scripts/quest-reward-payout.js');
            await runPollenGrant({ core });

      - name: Comment payout receipt
        if: steps.grant.outputs.results != ''
        uses: actions/github-script@v7
        env:
          RESULTS: ${{ steps.grant.outputs.results }}
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { postReceipt } = require('./.github/scripts/quest-reward-payout.js');
            await postReceipt({ github, context, core });
