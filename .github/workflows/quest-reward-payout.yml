name: Quest Issue Completion

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

env:
  QUEST_PAYOUT_FALLBACK: ${{ vars.QUEST_PAYOUT_FALLBACK || 'Circuit-Overtime' }}

jobs:
  payout:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate Polly Bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}
          owner: pollinations

      - name: Checkout trusted base code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Evaluate quest issue updates
        id: resolve
        uses: actions/github-script@v7
        env:
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { evaluateQuestIssueUpdates } = require('./.github/scripts/quest-reward-payout.js');
            await evaluateQuestIssueUpdates({ github, context, core });

      - name: Record GitHub quest issue
        if: steps.resolve.outputs.questIssues != ''
        id: record
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MYCELI }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_MYCELI }}
          QUEST_ISSUES: ${{ steps.resolve.outputs.questIssues }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const { runQuestIssueSync } = require('./.github/scripts/quest-reward-payout.js');
            await runQuestIssueSync({ core });

      - name: Comment quest issue receipt
        if: steps.record.outputs.results != ''
        uses: actions/github-script@v7
        env:
          RESULTS: ${{ steps.record.outputs.results }}
          PAYOUT_FALLBACK: ${{ env.QUEST_PAYOUT_FALLBACK }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { postReceipt } = require('./.github/scripts/quest-reward-payout.js');
            await postReceipt({ github, context, core });
