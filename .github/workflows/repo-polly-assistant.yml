# Pollinations AI - AI assistant via Pollinations AI
# Trigger: polly | Whitelist: voodoohop, ElliotEtag, Circuit-Overtime, Itachi-1824

name: Repo / Polly assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  polly:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'polly')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, 'polly')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, 'polly')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, 'polly') || contains(github.event.issue.title, 'polly')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      POLLINATIONS_TOKEN: ${{ secrets.PLN_GITHUB_POLLY_KEY }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: token
        with:
          app-id: ${{ secrets.POLLY_BOT_APP_ID }}
          private-key: ${{ secrets.POLLY_BOT_PRIVATE_KEY }}

      - name: Check Whitelist
        id: whitelist
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            // Strict case check: ensure lowercase 'polly' exists
            let body = '';
            if (context.eventName === 'issue_comment' || context.eventName === 'pull_request_review_comment') {
              body = context.payload.comment?.body || '';
            } else if (context.eventName === 'issues') {
              body = (context.payload.issue?.body || '') + (context.payload.issue?.title || '');
            } else if (context.eventName === 'pull_request_review') {
              body = context.payload.review?.body || '';
            }

            if (!body.includes('polly')) {
              console.log('Strict check failed: "polly" must be lowercase.');
              core.setOutput('authorized', 'false');
              return; 
            }

            const whitelist = ['voodoohop', 'ElliotEtag', 'Circuit-Overtime', 'Itachi-1824'];
            const actor = context.actor;
            if (!whitelist.includes(actor)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue?.number || context.payload.pull_request?.number,
                body: `Sorry @${actor}, only whitelisted users can use Polly.`
              });
              core.setOutput('authorized', 'false');
            } else {
              core.setOutput('authorized', 'true');
            }

      - name: Setup Bun
        if: steps.whitelist.outputs.authorized == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup
        if: steps.whitelist.outputs.authorized == 'true'
        id: setup
        run: |
          # Add eyes reaction
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "issues" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content=eyes || true
          fi

          # Get bot user ID and setup router config
          BOT_USER_ID=$(gh api "/users/${{ steps.token.outputs.app-slug }}[bot]" --jq .id)
          echo "user-id=$BOT_USER_ID" >> "$GITHUB_OUTPUT"
          mkdir -p $HOME/.claude-code-router

          # The router folds Anthropic's top-level `system` into messages[0] but
          # leaves content as an array of typed blocks, which OpenAI-compatible
          # upstreams reject ("messages[0].content.str should be a valid
          # string"). Config transformers don't run on this path, so this shim
          # flattens the body on its way out. It also mirrors the upstream
          # content-type: returning JSON for an SSE body makes the router
          # JSON.parse "data: {...}" and fail.
          cat > $HOME/.claude-code-router/oai-shim.js <<'SHIM'
          const http = require("http");
          const UPSTREAM = "https://gen.pollinations.ai/v1/chat/completions";

          const flatten = (c) => {
            if (typeof c === "string") return c;
            if (!Array.isArray(c)) return c;
            return c.filter((b) => b && b.type === "text" && b.text)
                    .map((b) => b.text).join("\n");
          };

          http.createServer((req, res) => {
            let raw = "";
            req.on("data", (d) => (raw += d));
            req.on("end", async () => {
              let body;
              try { body = JSON.parse(raw); }
              catch { res.writeHead(400).end('{"error":"bad json"}'); return; }

              if (Array.isArray(body.messages)) {
                body.messages = body.messages.map((m) => {
                  const next = { ...m, content: flatten(m.content) };
                  delete next.cache_control;
                  return next;
                });
              }

              let r;
              try {
                r = await fetch(UPSTREAM, {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    Authorization: req.headers.authorization || "",
                  },
                  body: JSON.stringify(body),
                });
              } catch (err) {
                res.writeHead(502, { "Content-Type": "application/json" })
                   .end(JSON.stringify({ error: { message: String(err) } }));
                return;
              }

              res.writeHead(r.status, {
                "Content-Type": r.headers.get("content-type") || "application/json",
              });
              if (!r.body) { res.end(await r.text()); return; }
              const reader = r.body.getReader();
              for (;;) {
                const { done, value } = await reader.read();
                if (done) break;
                res.write(Buffer.from(value));
              }
              res.end();
            });
          }).listen(9912);
          SHIM

          node $HOME/.claude-code-router/oai-shim.js &
          for i in $(seq 1 30); do
            curl -s -o /dev/null http://127.0.0.1:9912 && break
            sleep 1
          done

          # jq builds the JSON so the token is never expanded into a shell
          # string that could surface in logs or -x traces.
          jq -n --arg key "$POLLINATIONS_TOKEN" '{
            LOG: false,
            NON_INTERACTIVE_MODE: true,
            API_TIMEOUT_MS: 600000,
            Providers: [{
              name: "pollinations",
              api_base_url: "http://127.0.0.1:9912/v1/chat/completions",
              api_key: $key,
              models: ["gpt-5.6-sol", "minimax", "perplexity"]
            }],
            Router: {
              default: "pollinations,gpt-5.6-sol",
              background: "pollinations,minimax",
              webSearch: "pollinations,perplexity"
            }
          }' > $HOME/.claude-code-router/config.json

          # Start router with Bun. Pinned: v3 replaced this flat config.json
          # with a sqlite/UI-driven setup that has no headless equivalent.
          bunx @musistudio/claude-code-router@2.0.0 start &
          until curl -s http://localhost:3456 >/dev/null; do sleep 0.5; done
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - uses: actions/checkout@v4
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number)) || github.sha }}
          repository: ${{ github.repository }}
          token: ${{ steps.token.outputs.token }}


      - uses: anthropics/claude-code-action@v1
        if: steps.whitelist.outputs.authorized == 'true'
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GIT_AUTHOR_NAME: "${{ steps.token.outputs.app-slug }}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.setup.outputs.user-id }}+${{ steps.token.outputs.app-slug }}[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "${{ steps.token.outputs.app-slug }}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.setup.outputs.user-id }}+${{ steps.token.outputs.app-slug }}[bot]@users.noreply.github.com"
        with:
          anthropic_api_key: "ccr-pollinations"
          show_full_output: true
          github_token: ${{ steps.token.outputs.token }}
          trigger_phrase: "polly"
          claude_args: |
            --system-prompt "You are Polly, a helpful developer on the Pollinations team. Never mention Claude, Claude Code, AI, or LLMs — you are just a team member. Be casual, concise, and human. Use bullet points. No verbose explanations. When commenting on issues or reviewing PRs, write like a friendly dev — short, direct, helpful."
          additional_permissions: |
            actions: read
