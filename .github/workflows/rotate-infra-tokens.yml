name: Rotate Infra Tokens

on:
  workflow_dispatch:
    inputs:
      token:
        description: "Which token to rotate"
        required: true
        type: choice
        options:
          - enter
          - gpu
          - both
      dry_run:
        description: "Dry run (preview without changes)"
        required: false
        type: boolean
        default: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DRY_RUN: ${{ inputs.dry_run }}
      TOKEN_TARGET: ${{ inputs.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install tools
        run: |
          npm install -g wrangler
          echo "sops $(sops --version)"
          echo "wrangler $(wrangler --version)"
          echo "jq $(jq --version)"

      - name: Rotate PLN_ENTER_TOKEN
        if: inputs.token == 'enter' || inputs.token == 'both'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd tools/scripts/rotation
          if [ "$DRY_RUN" = "true" ]; then
            bash rotate-infra-enter-token.sh --dry-run
          else
            bash rotate-infra-enter-token.sh
          fi

      - name: Rotate PLN_GPU_TOKEN
        if: inputs.token == 'gpu' || inputs.token == 'both'
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd tools/scripts/rotation
          if [ "$DRY_RUN" = "true" ]; then
            bash rotate-infra-gpu-token.sh --dry-run
          else
            bash rotate-infra-gpu-token.sh
          fi

      # --- Deploy EC2 services to pick up new SOPS values ---

      - name: Decrypt .env files
        if: inputs.dry_run == false
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops --output-type dotenv -d text.pollinations.ai/secrets/env.json > text.pollinations.ai/.env
          sops --output-type dotenv -d image.pollinations.ai/secrets/env.json > image.pollinations.ai/.env
          echo "Decrypted .env files with new token values"

      - name: Copy .env files to EC2
        if: inputs.dry_run == false
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ENTER_SERVICES_HOST }}
          username: ${{ secrets.ENTER_SERVICES_USER }}
          key: ${{ secrets.ENTER_SERVICES_SSH_KEY }}
          source: "text.pollinations.ai/.env,image.pollinations.ai/.env"
          target: "/home/ubuntu/pollinations/"
          strip_components: 0

      - name: Restart EC2 services
        if: inputs.dry_run == false
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ENTER_SERVICES_HOST }}
          username: ${{ secrets.ENTER_SERVICES_USER }}
          key: ${{ secrets.ENTER_SERVICES_SSH_KEY }}
          script: |
            set -e
            chmod 600 /home/ubuntu/pollinations/text.pollinations.ai/.env
            chmod 600 /home/ubuntu/pollinations/image.pollinations.ai/.env
            sudo systemctl restart text-pollinations.service image-pollinations.service
            sleep 10
            sudo systemctl is-active text-pollinations.service || exit 1
            sudo systemctl is-active image-pollinations.service || exit 1
            echo "EC2 services restarted with new tokens"

      # --- Health checks ---

      - name: Health check
        if: inputs.dry_run == false
        run: |
          echo "Waiting 15s for services to stabilize..."
          sleep 15

          # Check models endpoint
          MODELS=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" \
            "https://gen.pollinations.ai/v1/models")
          echo "Models endpoint: HTTP $MODELS"
          if [ "$MODELS" != "200" ]; then
            echo "FAIL: models endpoint returned $MODELS"
            exit 1
          fi

          # Test image generation
          IMAGE=$(curl -s --max-time 120 -o /dev/null -w "%{http_code}" \
            "https://image.pollinations.ai/prompt/health_check_rotation_$(date +%s)?width=256&height=256&nologo=true")
          echo "Image generation: HTTP $IMAGE"
          if [ "$IMAGE" != "200" ]; then
            echo "FAIL: image generation returned $IMAGE"
            exit 1
          fi

          echo "All health checks passed"

      # --- Commit SOPS changes ---

      - name: Commit and push SOPS changes
        if: inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A '*.json'
          if git diff --cached --quiet; then
            echo "No SOPS changes to commit"
          else
            git commit -m "rotate infra tokens ($TOKEN_TARGET)"
            git push origin main
          fi
