name: User Downgrade Spore to Microbe

permissions:
  contents: read

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scan-and-apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enter.pollinations.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Create API token file
        run: echo "ENTER_API_TOKEN_REMOTE=${{ secrets.ENTER_API_TOKEN }}" > .testingtokens

      - name: Scan spore users for abuse
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx src/tier-progression/flows/spore-to-microbe-scan.ts --since-last-block --parallel 3

      - name: Apply downgrades
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx tsx src/tier-progression/flows/spore-to-microbe-apply.ts apply-blocks --env production
