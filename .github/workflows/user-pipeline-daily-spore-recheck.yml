name: User Pipeline - Daily Spore Recheck

permissions:
  contents: read

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  daily-spore-recheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enter.pollinations.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_BOSS_APP_ID }}
          private-key: ${{ secrets.ORG_BOSS_PRIVATE_KEY }}
          owner: pollinations

      - name: Install dependencies
        run: npm install

      - name: Daily spore recheck (staging)
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run user-pipeline:daily-spore-recheck -- --env staging
