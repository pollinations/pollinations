name: User Pipeline - Hourly New Users

permissions:
  contents: read

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  hourly-new-user-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enter.pollinations.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "enter.pollinations.ai/package-lock.json"

      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_BOSS_APP_ID }}
          private-key: ${{ secrets.ORG_BOSS_PRIVATE_KEY }}
          owner: pollinations

      - name: Install dependencies
        run: npm install

      - name: Create API token file
        run: echo "ENTER_API_TOKEN_REMOTE=${{ secrets.ENTER_API_TOKEN }}" > .testingtokens

      - name: New-user trust scoring (staging)
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run user-pipeline:trust-score -- --store-status

      - name: Hourly new-user pipeline (staging)
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run user-pipeline:hourly-new-users -- --env staging
