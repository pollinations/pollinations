<!doctype html>
<html lang="en" class="polli-ui-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Set color mode before first paint to avoid a flash. Source of truth
         after mount: @pollinations/ui ColorModeToggle (STORAGE_KEY must match). -->
    <script>
      (() => {
        try {
          let mode = localStorage.getItem("polli-color-mode");
          if (mode !== "light" && mode !== "dark") {
            mode = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (mode === "dark") document.documentElement.classList.add("dark");
          // theme-color (browser chrome) is derived from the --polli-color-app-bg
          // token by @pollinations/ui ColorModeToggle once styles load — no
          // hardcoded color here.
        } catch {
          /* ignore storage / matchMedia failures */
        }
      })();
    </script>

    <meta name="description" content="Real-time health monitoring for Pollinations AI models" />

    <!-- Favicons & touch icons (generated from @pollinations/ui via tools/icons) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="https://model-monitor.pollinations.ai" />

    <!-- iOS Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Model Monitor" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Model Monitor | pollinations.ai" />
    <meta property="og:description" content="Real-time health monitoring for Pollinations AI models" />
    <meta property="og:image" content="https://model-monitor.pollinations.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="pollinations.ai logo" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://model-monitor.pollinations.ai" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Model Monitor | pollinations.ai" />
    <meta name="twitter:description" content="Real-time health monitoring for Pollinations AI models" />
    <meta name="twitter:image" content="https://model-monitor.pollinations.ai/og-image.png" />

    <title>Model Monitor | pollinations.ai</title>
  </head>
  <body class="polli-ui-shell" data-theme="neutral">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
