name = "myceli-economics"
main = "worker/index.ts"
compatibility_date = "2026-07-15"
workers_dev = true

routes = [
    { pattern = "economics.myceli.ai", zone_name = "myceli.ai", custom_domain = true },
    { pattern = "economics.pollinations.ai", zone_name = "pollinations.ai", custom_domain = true }
]

[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
TINYBIRD_API = "https://api.europe-west2.gcp.tinybird.co"

# Secrets:
# - ECONOMICS_PASSWORD
# - TINYBIRD_ECONOMICS_READ_TOKEN
