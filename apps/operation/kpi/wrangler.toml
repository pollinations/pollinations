name = "myceli-kpi"
# account_id is set via CLOUDFLARE_ACCOUNT_ID env var in CI
main = "src/worker/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

routes = [
    { pattern = "kpi.myceli.ai", zone_name = "myceli.ai", custom_domain = true },
    { pattern = "kpi.pollinations.ai", zone_name = "pollinations.ai", custom_domain = true }
]

[site]
bucket = "./dist"

[vars]
TINYBIRD_API = "https://api.europe-west2.gcp.tinybird.co"
GITHUB_REPO = "pollinations/pollinations"

# Secrets (set via: wrangler secret put <NAME>)
# - TINYBIRD_READ_TOKEN (read-only)
# - GITHUB_TOKEN (optional, for higher rate limits)
