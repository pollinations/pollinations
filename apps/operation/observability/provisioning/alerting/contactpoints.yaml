apiVersion: 1

contactPoints:
  - orgId: 1
    name: Discord Critical
    receivers:
      - uid: discord-critical
        type: webhook
        settings:
          url: "$__env{DISCORD_WEBHOOK_URL}"
          httpMethod: POST
          body: |
            {"content": "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}", "embeds": []}
        disableResolveMessage: true
