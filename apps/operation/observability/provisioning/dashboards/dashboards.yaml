apiVersion: 1

providers:
  - name: observability
    orgId: 1
    folder: Observability
    folderUid: observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/rebuild

  - name: legacy-observability
    orgId: 1
    folder: Legacy Observability
    folderUid: legacy-observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/legacy
