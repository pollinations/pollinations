<!doctype html>
<html lang="en" class="polli-ui-root">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <script>
            (() => {
                try {
                    let mode = localStorage.getItem("polli-color-mode");
                    if (mode !== "light" && mode !== "dark") {
                        mode = matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light";
                    }
                    if (mode === "dark") document.documentElement.classList.add("dark");
                } catch {
                    /* ignore storage / matchMedia failures */
                }
            })();
        </script>
        <meta name="description" content="Treezory operations dashboard for Pollinations treasury insights, raw spend, revenue, Pollen, and provider usage data." />
        <meta name="robots" content="noindex" />
        <title>Treezory | pollinations.ai</title>

        <!-- Open Graph / Social Media Meta Tags -->
        <meta property="og:title" content="Treezory | pollinations.ai" />
        <meta property="og:description" content="Treezory operations dashboard for Pollinations treasury insights, raw spend, revenue, Pollen, and provider usage data." />
        <meta property="og:image" content="/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="pollinations.ai logo" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:site_name" content="pollinations.ai" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@pollinations_ai" />
        <meta name="twitter:title" content="Treezory | pollinations.ai" />
        <meta name="twitter:description" content="Treezory operations dashboard for Pollinations treasury insights, raw spend, revenue, Pollen, and provider usage data." />
        <meta name="twitter:image" content="/og-image.png" />
        <meta name="twitter:image:alt" content="pollinations.ai logo" />

        <!-- Favicons and Icons -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico?v=dark" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=dark" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=dark" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=dark" />
        <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png?v=dark" />
        <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png?v=dark" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.webmanifest" />

        <!-- iOS Meta Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Treezory" />
    </head>
    <body class="polli-ui-shell">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
