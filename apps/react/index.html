<!doctype html>
<html lang="en" class="polli-ui-root">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Set color mode before first paint to avoid a flash. Source of truth
             after mount: @pollinations/ui ColorModeToggle (STORAGE_KEY must match). -->
        <script>
            (() => {
                try {
                    let mode = localStorage.getItem("polli-color-mode");
                    if (mode !== "light" && mode !== "dark") {
                        mode = matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light";
                    }
                    if (mode === "dark") document.documentElement.classList.add("dark");
                    // theme-color (browser chrome) is derived from the
                    // --polli-color-app-bg token by @pollinations/ui
                    // ColorModeToggle once styles load — no hardcoded color here.
                } catch {
                    /* ignore storage / matchMedia failures */
                }
            })();
        </script>
        <meta
            name="description"
            content="React UI showcase for the Pollinations SDK and UI component library — auth, wallet, and design primitives."
        />

        <title>React UI | pollinations.ai</title>

        <!-- Open Graph / Social Media Meta Tags -->
        <meta property="og:title" content="React UI | pollinations.ai" />
        <meta
            property="og:description"
            content="React UI showcase for the Pollinations SDK and UI component library — auth, wallet, and design primitives."
        />
        <meta property="og:image" content="https://react.pollinations.ai/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="pollinations.ai logo" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:url" content="https://react.pollinations.ai" />
        <meta property="og:site_name" content="pollinations.ai" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@pollinations_ai" />
        <meta name="twitter:title" content="React UI | pollinations.ai" />
        <meta
            name="twitter:description"
            content="React UI showcase for the Pollinations SDK and UI component library — auth, wallet, and design primitives."
        />
        <meta name="twitter:image" content="https://react.pollinations.ai/og-image.png" />
        <meta name="twitter:image:alt" content="pollinations.ai logo" />

        <!-- Favicons & touch icons (generated from @pollinations/ui via tools/icons) -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico?v=react-amber-20260605" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=react-amber-20260605" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=react-amber-20260605" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=react-amber-20260605" />
        <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png?v=react-amber-20260605" />
        <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png?v=react-amber-20260605" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.webmanifest?v=react-amber-20260605" />
        <link rel="canonical" href="https://react.pollinations.ai" />

        <!-- iOS Meta Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="React UI" />
    </head>
    <body class="polli-ui-shell" data-theme="amber">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
