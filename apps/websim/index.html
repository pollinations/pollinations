<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (() => {
        try {
          let mode = localStorage.getItem("polli-color-mode");
          if (mode !== "light" && mode !== "dark") {
            mode = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (mode === "dark") document.documentElement.classList.add("dark");
        } catch {
          /* ignore storage / matchMedia failures */
        }
      })();
    </script>

    <meta
      name="description"
      content="Generate shareable single-file HTML pages with Pollinations Websim."
    />
