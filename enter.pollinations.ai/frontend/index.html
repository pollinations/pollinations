<!doctype html>
<html lang="en" class="polli-ui-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Set color mode before first paint to avoid a flash. Source of truth
         after mount: @pollinations/ui ColorModeToggle (STORAGE_KEY must match). -->
    <script>
      (() => {
        try {
          let mode = (document.cookie.match(/(?:^|;\s*)polli-color-mode=(light|dark)(?:;|$)/) || [])[1] || localStorage.getItem("polli-color-mode");
          if (mode !== "light" && mode !== "dark") {
            mode = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (mode === "dark") document.documentElement.classList.add("dark");
          // theme-color (browser chrome) is derived from the --polli-color-app-bg
          // token by @pollinations/ui ColorModeToggle once styles load — no
          // hardcoded color here.
        } catch {
          /* ignore storage / matchMedia failures */
        }
      })();
    </script>
    <meta name="description" content="Pollinations dashboard for AI generation APIs. Create API keys, track usage, monitor Pollen, and connect apps across image, text, video, and audio." />

    <title>Dashboard | pollinations.ai</title>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Dashboard | pollinations.ai" />
    <meta property="og:description" content="Pollinations dashboard for AI generation APIs. Create API keys, track usage, monitor Pollen, and connect apps across image, text, video, and audio." />
    <meta property="og:image" content="%PUBLIC_ORIGIN%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="pollinations.ai logo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://enter.pollinations.ai" />
    <meta property="og:site_name" content="pollinations.ai" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pollinations_ai" />
    <meta name="twitter:title" content="Dashboard | pollinations.ai" />
    <meta name="twitter:description" content="Pollinations dashboard for AI generation APIs. Create API keys, track usage, monitor Pollen, and connect apps across image, text, video, and audio." />
    <meta name="twitter:image" content="%PUBLIC_ORIGIN%/og-image.png" />
    <meta name="twitter:image:alt" content="pollinations.ai logo" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=dark">

    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png?v=dark">

    <link href="/src/style.css" rel="stylesheet">
