[env.production]

[env.production.triggers]
crons = ["*/15 * * * *"]

[env.production.observability]
enabled = true
head_sampling_rate = 1

[[env.production.routes]]
pattern = "enter.myceli.ai"
zone_name = "myceli.ai"
