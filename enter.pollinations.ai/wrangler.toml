name = "pollinations-enter"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = [ "nodejs_compat", "nodejs_als" ]
account_id = "b6ec751c0862027ba269faf7029b2501"

[dev]
port = 3000

[assets]
directory = "dist/client"
not_found_handling = "single-page-application"
run_worker_first = [ "/api/*" ]

[[d1_databases]]
binding = "DB"
database_name = "development-pollinations-enter-db"
database_id = "2b844596-9890-4a2e-9da9-6c65681fa24d"
migrations_dir = "drizzle"

[[kv_namespaces]]
# development-pollinations-enter-kv
binding = "KV"
id = "84512601e2a44679a4d3b0f7415d90ec"

[vars]
ENVIRONMENT = "development"
CLOUDFLARE_ACCOUNT_ID = "b6ec751c0862027ba269faf7029b2501"
LOG_LEVEL = "trace"
LOG_FORMAT = "text"
TINYBIRD_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=generation_event"
TINYBIRD_TIER_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=tier_event"
TINYBIRD_STRIPE_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=stripe_event"
# Stripe payments (sandbox for dev)
STRIPE_MODE = "sandbox"
STRIPE_SUCCESS_URL = "http://localhost:3000"
BETTER_AUTH_URL = "http://localhost:3000"
# Stripe Payment Method Configurations (sandbox)
STRIPE_AUTO_TOP_UP_PMC_ID = "pmc_1TUpob6O03AauPe8EgmA4mvg"
# Single broad checkout PMC; Stripe filters methods by buyer currency/country.
STRIPE_PMC = "pmc_1SrYT96O03AauPe8ijLy6sZU"

