name = "pollinations-app-host"
main = "src/app-host.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat", "nodejs_als"]
account_id = "b6ec751c0862027ba269faf7029b2501"

[env.production]

[[env.production.d1_databases]]
remote = true
binding = "DB"
database_name = "production-pollinations-enter-db"
database_id = "fc771b05-4e24-48bf-980c-d09f21279bd1"

[[env.production.r2_buckets]]
binding = "APP_BUCKET"
bucket_name = "pollinations-apps"

[env.production.vars]
ENVIRONMENT = "production"
APP_DEPLOY_HOST = "pollinations.ai"

[env.staging]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "staging-pollinations-enter-db"
database_id = "63da5347-3fa8-4410-a68f-c9e83956f76a"

[[env.staging.r2_buckets]]
binding = "APP_BUCKET"
bucket_name = "pollinations-apps-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
APP_DEPLOY_HOST = "pollinations.ai"
