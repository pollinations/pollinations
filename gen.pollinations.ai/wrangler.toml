name = "pollinations-gen"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat", "nodejs_als"]

# Service binding to enter worker (zero latency - same V8 isolate)
services = [
    { binding = "ENTER", service = "pollinations-enter" }
]

[[d1_databases]]
binding = "DB"
database_name = "development-pollinations-enter-db"
database_id = "6345cb3c-e57a-4aab-bdd4-bca0de7bd930"
migrations_dir = "../enter.pollinations.ai/drizzle"

[[kv_namespaces]]
binding = "KV"
id = "aa0d0aceb6bd45de93032270c7adf4ab"

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "pollinations-images"

[[r2_buckets]]
binding = "TEXT_BUCKET"
bucket_name = "pollinations-text-enter"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "trace"
LOG_FORMAT = "text"
ALLOW_ANONYMOUS_USAGE = false
TINYBIRD_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=generation_event"
TINYBIRD_TIER_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=tier_event"
IMAGE_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16384"
TEXT_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16385"

[dev]
port = 8788

# Production routes
[env.production]

[[env.production.routes]]
pattern = "gen.pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true

[[env.production.services]]
binding = "ENTER"
service = "pollinations-enter-production"

[[env.production.d1_databases]]
remote = true
binding = "DB"
database_name = "production-pollinations-enter-db"
database_id = "f9cf0f09-b7aa-4cd3-8f9d-fa50c97ff1f3"
migrations_dir = "../enter.pollinations.ai/drizzle"

[[env.production.kv_namespaces]]
binding = "KV"
id = "eb4ea5149a5a413db53902bf2b8c1d95"

[[env.production.r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "pollinations-images"

[[env.production.r2_buckets]]
binding = "TEXT_BUCKET"
bucket_name = "pollinations-text-enter"

[[env.production.ratelimits]]
name = "EDGE_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10000, period = 10 }

[[env.production.durable_objects.bindings]]
name = "POLLEN_RATE_LIMITER"
class_name = "PollenRateLimiter"
script_name = "pollinations-enter-production"

[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "debug"
LOG_FORMAT = "json"
ALLOW_ANONYMOUS_USAGE = false
TINYBIRD_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=generation_event"
TINYBIRD_TIER_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=tier_event"
IMAGE_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16384"
TEXT_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16385"
POLLEN_REFILL_PER_HOUR = 1

# Staging routes
[env.staging]

[[env.staging.routes]]
pattern = "staging.gen.pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true

[[env.staging.services]]
binding = "ENTER"
service = "pollinations-enter-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "staging-pollinations-enter-db"
database_id = "bd0ef469-d727-4ff4-9118-bd7e6e7985ae"
migrations_dir = "../enter.pollinations.ai/drizzle"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "eb4ea5149a5a413db53902bf2b8c1d95"

[[env.staging.r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "pollinations-images"

[[env.staging.r2_buckets]]
binding = "TEXT_BUCKET"
bucket_name = "pollinations-text-enter"

[[env.staging.ratelimits]]
name = "EDGE_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10000, period = 10 }

[[env.staging.durable_objects.bindings]]
name = "POLLEN_RATE_LIMITER"
class_name = "PollenRateLimiter"
script_name = "pollinations-enter-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"
LOG_FORMAT = "json"
ALLOW_ANONYMOUS_USAGE = false
TINYBIRD_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=generation_event"
TINYBIRD_TIER_INGEST_URL = "https://api.europe-west2.gcp.tinybird.co/v0/events?name=tier_event"
IMAGE_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16384"
TEXT_SERVICE_URL = "http://ec2-54-147-14-220.compute-1.amazonaws.com:16385"
