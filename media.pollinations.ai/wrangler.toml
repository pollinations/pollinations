name = "pollinations-media"
main = "src/index.ts"
compatibility_date = "2025-11-12"
compatibility_flags = ["nodejs_compat"]

# Local development server
[env.development]
name = "pollinations-media-dev"

[env.development.vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[env.development.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "media-dev"
# TODO: Replace with actual D1 UUID from `wrangler d1 create media-dev`
database_id = "TODO-REPLACE-WITH-UUID-FROM-wrangler-d1-create"
migrations_dir = "drizzle"

# Production environment
[env.production]
name = "pollinations-media-prod"

[env.production.vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[env.production.routes]]
pattern = "media.pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media"

[[env.production.d1_databases]]
binding = "DB"
database_name = "media-prod"
# TODO: Replace with actual D1 UUID from `wrangler d1 create media-prod --remote`
database_id = "TODO-REPLACE-WITH-UUID-FROM-wrangler-d1-create"
migrations_dir = "drizzle"

[vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media"

# Dev server settings
[dev]
port = 8790
local_protocol = "http"
