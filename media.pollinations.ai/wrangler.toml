name = "pollinations-media"
main = "src/index.ts"
compatibility_date = "2025-11-12"
compatibility_flags = ["nodejs_compat"]
account_id = "b6ec751c0862027ba269faf7029b2501"

# Local development server
[env.development]
name = "pollinations-media-dev"

[env.development.vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[env.development.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "development-pollinations-enter-db"
database_id = "2b844596-9890-4a2e-9da9-6c65681fa24d"
migrations_dir = "../enter.pollinations.ai/drizzle"

# Production environment
[env.production]
name = "pollinations-media-prod"

[env.production.vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[env.production.routes]]
pattern = "media.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media"

[[env.production.d1_databases]]
remote = true
binding = "DB"
database_name = "production-pollinations-enter-db"
database_id = "fc771b05-4e24-48bf-980c-d09f21279bd1"
migrations_dir = "../enter.pollinations.ai/drizzle"

[vars]
MAX_FILE_SIZE = "52428800"  # 50MB in bytes

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pollinations-media"

[[d1_databases]]
binding = "DB"
database_name = "development-pollinations-enter-db"
database_id = "2b844596-9890-4a2e-9da9-6c65681fa24d"
migrations_dir = "../enter.pollinations.ai/drizzle"

# Dev server settings
[dev]
port = 8790
local_protocol = "http"
