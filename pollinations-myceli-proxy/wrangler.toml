name = "pollinations-proxy"
main = "src/index.ts"
compatibility_date = "2025-11-01"
account_id = "efdcb0933eaac64f27c0b295039b28f2"

routes = [
  { pattern = "pollinations.ai", custom_domain = true },
  { pattern = "enter.pollinations.ai", custom_domain = true },
  { pattern = "gen.pollinations.ai", custom_domain = true },
  { pattern = "media.pollinations.ai", custom_domain = true },
  # Catch-all for self-serve user apps (<slug>.pollinations.ai): the generic
  # upstream rule maps them to <slug>.myceli.ai. Exact custom domains above
  # and below always win over the wildcard. Requires a proxied wildcard DNS
  # record (`*` -> 192.0.2.1) on the pollinations.ai zone (one-time, manual).
  { pattern = "*.pollinations.ai/*", zone_id = "0942247b74a58e4fc5ea70341a3754a3" },
  # GENERATED-PROXY-ROUTES (apps + ops; injected by scripts/gen-routes.mjs)
]

# Host-to-upstream map is in [vars]; staging deploys with [env.staging]
# overrides. Keys are the public host, values are the Myceli upstream host.
[vars]
UPSTREAM_MAP = '{"pollinations.ai":"pollinations.myceli.ai","enter.pollinations.ai":"enter.myceli.ai","gen.pollinations.ai":"gen.myceli.ai","media.pollinations.ai":"media.myceli.ai"}'

[env.staging]
name = "pollinations-proxy-staging"
routes = [
  { pattern = "staging.pollinations.ai", custom_domain = true },
  { pattern = "staging.enter.pollinations.ai", custom_domain = true },
  { pattern = "staging.gen.pollinations.ai", custom_domain = true },
]

[env.staging.vars]
UPSTREAM_MAP = '{"staging.pollinations.ai":"staging.pollinations.myceli.ai","staging.enter.pollinations.ai":"staging.enter.myceli.ai","staging.gen.pollinations.ai":"staging.gen.myceli.ai"}'

[env.dev]
name = "pollinations-proxy-dev"
routes = [
  { pattern = "dev.enter.pollinations.ai", custom_domain = true },
]

[env.dev.vars]
UPSTREAM_MAP = '{"dev.enter.pollinations.ai":"dev.enter.myceli.ai"}'
