name = "pollinations-ai"
compatibility_date = "2025-11-01"
main = "src/worker.ts"
account_id = "b6ec751c0862027ba269faf7029b2501"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Public hostname is pollinations.ai, served by the pollinations-myceli-proxy
# worker in the old account, which forwards to pollinations.myceli.ai (below).
[env.production]

[[env.production.routes]]
pattern = "pollinations.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true

[env.staging]

[[env.staging.routes]]
pattern = "staging.pollinations.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true
