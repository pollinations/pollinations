name = "pollinations-ai"
compatibility_date = "2025-11-01"
main = "src/worker.ts"
account_id = "b6ec751c0862027ba269faf7029b2501"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the worker on every request so the SEO HTMLRewriter fires on navigations.
# Without this, compatibility_date >= 2025-04-01 serves navigation requests as
# static assets and skips the worker, so per-route meta never gets rewritten.
# Non-HTML responses are passed through unchanged (see src/worker.ts).
run_worker_first = true

# Public hostnames are attached directly in the Myceli account.
[env.production]

[[env.production.routes]]
pattern = "pollinations.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true

[[env.production.routes]]
pattern = "pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true

[[env.production.routes]]
pattern = "www.pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true

[env.staging]

[[env.staging.routes]]
pattern = "staging.pollinations.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true

[[env.staging.routes]]
pattern = "staging.myceli.ai"
zone_name = "myceli.ai"
custom_domain = true

[[env.staging.routes]]
pattern = "staging.pollinations.ai"
zone_name = "pollinations.ai"
custom_domain = true
