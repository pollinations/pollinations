# Social Media Posting Schedule
# All times in UTC
# Used by buffer_publish.py to schedule posts via Buffer's customScheduled mode
#
# Each post is generated once and delivered once at the preferred time.
# Buffer staging happens immediately after generation (PUBLISH_MODE=buffer).
# Direct channels (Reddit, Discord) publish via separate cron (PUBLISH_MODE=direct).

# ── Daily platforms (via Buffer) ─────────────────────────────────────
# Generated Mon-Sat at 06:00 UTC (generate_daily.py).
# Staged to Buffer immediately after generation (NEWS_summary.yml).
# No daily posts on Sundays — weekly replaces them.

twitter:
  # Daily (except Sunday — weekly covers it)
  days: [1, 2, 3, 4, 5, 6]  # Mon-Sat (1=Monday, 7=Sunday)
  preferred: "15:00"  # 15:00 UTC

instagram:
  # Daily (except Sunday — weekly covers it)
  days: [1, 2, 3, 4, 5, 6]  # Mon-Sat
  preferred: "15:00"  # 15:00 UTC

# ── Daily platforms (not via Buffer) ─────────────────────────────────
# Reddit daily: deployed to VPS via SSH at 15:00 UTC cron (NEWS_publish.yml)
# Discord daily: realtime per-PR webhook only (publish_realtime.py)

# ── Weekly (Sunday 18:00 UTC) ──────────────────────────────────────
# Generated Sunday 06:00 UTC (generate_weekly.py) → committed to news branch.
# Buffer platforms (X, LI, IG) staged immediately after generation.
# Direct channels (Reddit, Discord) published at 18:00 UTC via cron.

weekly:
  days: [7]  # Sunday only
  preferred: "18:00"  # 18:00 UTC — EU evening + US afternoon

linkedin:
  # Weekly only — staged to Buffer on Sunday with the weekly digest.
  # No daily LinkedIn posts. LinkedIn algorithm rewards quality over frequency.
  days: [7]  # Sunday only
  preferred: "18:00"  # 18:00 UTC

# ── Non-social outputs ──────────────────────────────────────────────
#
# highlights:
#   Generated by generate_daily.py flow.
#   AI distills gists into curated highlights → social/news/highlights.md (news branch)
#
# readme:
#   Updated alongside highlights. Injects top 10 highlights into README.md
#   "## 🆕 Latest News" section via a small PR to main.

# How it works (3 workflows):
#
# NEWS_pr_gist.yml — on every PR merge:
#   generate_realtime.py creates gist JSON + pixel art image → news branch
#   publish_realtime.py posts to Discord
#
# NEWS_summary.yml — daily 06:00 UTC cron:
#   Mon-Sat: generate_daily.py → commit to news → stage X + IG to Buffer → README PR to main
#   Sunday:  generate_weekly.py → commit to news → stage X + LI + IG to Buffer
#
# NEWS_publish.yml — Mon-Sat 15:00 UTC + Sunday 18:00 UTC cron:
#   Daily:  publish_daily.py deploys Reddit to VPS (PUBLISH_MODE=direct)
#   Weekly: publish_weekly.py deploys Reddit to VPS + posts Discord (PUBLISH_MODE=direct)
